<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MetasBoard</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#dicaFinanceira{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#1e293b;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>MetasBoard</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<button onclick="registrar()">Criar Conta</button>

<div id="dicaFinanceira"></div>

</div>

<div class="modal" id="modalBoasVindas">

<div class="modal-content">

<h2>Bem-vindo ao MetasBoard 🎯</h2>

<p>
Este projeto foi criado para ajudar pessoas a organizarem metas
financeiras, desenvolverem consciência sobre gastos e melhorarem
sua saúde financeira ao longo do tempo.
</p>

<p>
Pequenas decisões financeiras feitas diariamente podem gerar
grandes mudanças no futuro.
</p>

<button onclick="fecharBoasVindas()">Começar</button>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
