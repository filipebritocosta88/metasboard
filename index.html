<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- MENU SUPERIOR -->
  <header>
    <nav>
      <ul>
        <li><button onclick="showSection('dashboard')">Dashboard</button></li>
        <li><button onclick="showSection('metas')">Metas</button></li>
        <li><button onclick="showSection('contas')">Contas</button></li>
        <li><button onclick="showSection('dividas')">Dívidas</button></li>
        <li><button onclick="showSection('perfil')">Perfil</button></li>
        <li><button onclick="logout()">Sair</button></li>
      </ul>
    </nav>
  </header>

  <!-- DASHBOARD -->
  <section id="dashboard">
    <h2>Dashboard</h2>
    <p id="totalContas">Total em contas: R$ 0</p>
    <p id="totalDividas">Total de dívidas: R$ 0</p>
    <p id="saldoLiquido">Saldo líquido: R$ 0</p>
  </section>

  <!-- METAS -->
  <section id="metas" style="display:none">
    <h2>Metas</h2>
    <div id="metasList"></div>
    <button onclick="adicionarMeta()">+ Adicionar Meta</button>
  </section>

  <!-- CONTAS -->
  <section id="contas" style="display:none">
    <h2>Contas</h2>
    <table id="contasTable">
      <tr>
        <th>Banco / Conta</th>
        <th>Tipo</th>
        <th>Saldo</th>
        <th>Ações</th>
      </tr>
    </table>
    <button onclick="adicionarConta()">+ Adicionar Conta</button>
  </section>

  <!-- DÍVIDAS -->
  <section id="dividas" style="display:none">
    <h2>Dívidas</h2>
    <table id="dividasTable">
      <tr>
        <th>Banco / Credor</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Vencimento</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </table>
    <button onclick="adicionarDivida()">+ Adicionar Dívida</button>
  </section>

  <!-- PERFIL -->
  <section id="perfil" style="display:none">
    <h2>Perfil</h2>
    <p>Configurações do usuário</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
