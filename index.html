<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Metasboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.bar{
height:10px;
background:#22c55e;
}

</style>

</head>

<body class="p-6">

<h1 class="text-3xl mb-6">Metasboard</h1>

<div class="flex gap-3 mb-6">

<button onclick="openScreen('dashboard')">Dashboard</button>
<button onclick="openScreen('fluxo')">Fluxo</button>
<button onclick="openScreen('metas')">Metas</button>
<button onclick="openScreen('gestao')">Gestão</button>
<button onclick="openScreen('ia')">IA</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="screen active">

<h2 class="text-xl mb-4">Resumo mensal</h2>

<div class="grid grid-cols-3 gap-4">

<div class="card">
Entradas
<p id="totalEntradas">0</p>
</div>

<div class="card">
Dívidas
<p id="totalDividas">0</p>
</div>

<div class="card">
Saldo Livre
<p id="saldoLivre">0</p>
</div>

</div>

<canvas id="grafico" class="mt-6"></canvas>

</div>



<!-- FLUXO -->

<div id="fluxo" class="screen">

<h2 class="text-xl mb-4">Fluxo financeiro</h2>

<input id="desc" placeholder="descrição" class="text-black p-2">
<input id="valor" placeholder="valor" class="text-black p-2">

<button onclick="addFluxo()" class="bg-green-500 p-2 rounded">Adicionar</button>

<div id="listaFluxo" class="mt-6"></div>

</div>


<!-- METAS -->

<div id="metas" class="screen">

<h2 class="text-xl mb-4">Metas</h2>

<input id="metaNome" placeholder="nome meta" class="text-black p-2">
<input id="metaValor" placeholder="valor alvo" class="text-black p-2">

<button onclick="addMeta()" class="bg-blue-500 p-2 rounded">Criar</button>

<div id="listaMetas" class="mt-6"></div>

</div>



<!-- GESTAO -->

<div id="gestao" class="screen">

<h2 class="text-xl mb-4">Dívidas</h2>

<input id="dividaNome" placeholder="nome" class="text-black p-2">
<input id="dividaValor" placeholder="valor" class="text-black p-2">

<button onclick="addDivida()" class="bg-red-500 p-2 rounded">Adicionar</button>

<div id="listaDividas" class="mt-6"></div>

</div>



<!-- IA -->

<div id="ia" class="screen">

<h2 class="text-xl mb-4">Assistente IA</h2>

<div id="chat"></div>

<div class="flex gap-3 mt-4">

<button onclick="ia('economizar')">Economizar</button>
<button onclick="ia('investir')">Investir</button>
<button onclick="ia('dividas')">Dívidas</button>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
