<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetasBoard Ultra Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #000000; --card: #0a0c14; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-card { background: rgba(10, 12, 20, 0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; backdrop-filter: blur(12px); }
    .nav-btn-m.active { color: var(--primary); font-weight: 900; filter: drop-shadow(0 0 8px var(--primary)); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; color: white !important; background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none !important; }
    .hp-bar { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .hp-fill { height: 100%; transition: width 1s ease-in-out; }
    .chat-window { position: fixed; bottom: 100px; right: 20px; width: 320px; height: 480px; z-index: 1001; display: none; flex-direction: column; }
    .submeta-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
    .submeta-item.done { opacity: 0.4; text-decoration: line-through; border-color: #a855f7; background: rgba(168, 85, 247, 0.05); }
    .swal2-popup { border-radius: 30px !important; background: #0a0c14 !important; border: 1px solid rgba(255,255,255,0.1) !important; }
  </style>
</head>
<body class="overflow-x-hidden no-scrollbar">

<div id="loginTela" class="flex items-center justify-center min-h-screen p-6 fixed inset-0 z-[9999] bg-black">
  <div class="glass-card p-10 w-full max-w-md text-center">
    <h1 class="text-4xl font-black mb-2 italic">METAS<span class="text-purple-500">BOARD</span></h1>
    <div class="space-y-4 mt-8">
      <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-2xl">
      <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl">
      <button onclick="executarAuth()" class="w-full bg-white text-black p-4 rounded-2xl font-black uppercase text-xs tracking-widest">Acessar</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen pb-28">
  <main class="p-4 md:p-8 max-w-5xl mx-auto space-y-6">
    <header class="flex justify-between items-center pt-4 px-2">
        <h2 class="text-2xl font-black italic uppercase">Metas<span class="text-purple-500">Board</span></h2>
        <div class="flex gap-2">
            <button onclick="abrirHistorico()" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase active:scale-95">📜 Histórico</button>
            <button onclick="sairDoSistema()" class="bg-rose-500/10 text-rose-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Sair</button>
        </div>
    </header>

    <div class="glass-card p-6 relative">
        <span class="text-[10px] font-black uppercase tracking-widest opacity-40">Patrimônio & Saúde</span>
        <div class="hp-bar my-3"><div id="hpFill" class="hp-fill bg-emerald-500" style="width: 100%"></div></div>
        <div id="valoresPrivados" class="grid grid-cols-3 gap-2 mt-4">
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Previsão</p><h4 id="receitaTotal" class="text-sm font-black text-emerald-400">R$ 0</h4></div>
            <div class="text-center border-x border-white/5"><p class="text-[8px] opacity-40 uppercase font-black">Disponível</p><h4 id="saldoReal" class="text-sm font-black text-purple-400">R$ 0</h4></div>
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Dívidas</p><h4 id="despesaTotal" class="text-sm font-black text-rose-500">R$ 0</h4></div>
        </div>
    </div>

    <section id="secDashboard" class="space-y-6">
        <div class="glass-card p-6">
            <div class="flex gap-4 mb-6">
                <button onclick="setTipo('ganho')" id="tabGanho" class="text-[10px] font-black uppercase text-purple-400 border-b-2 border-purple-500 pb-1">💰 Renda</button>
                <button onclick="setTipo('divida')" id="tabDivida" class="text-[10px] font-black uppercase opacity-40 pb-1">💸 Saída</button>
            </div>
            <div class="space-y-3">
                <input id="fNome" type="text" placeholder="Descrição" class="w-full p-4 rounded-2xl text-xs font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <input id="fValor" type="number" placeholder="Valor R$" class="p-4 rounded-2xl text-xs font-bold">
                    <input id="fData" type="date" class="p-4 rounded-2xl text-[10px]">
                </div>
                <div class="flex items-center gap-2 p-2">
                    <input type="checkbox" id="f5Dia" class="w-4 h-4 accent-purple-500">
                    <label for="f5Dia" class="text-[10px] font-black uppercase opacity-60">Salário (5º Dia Útil)</label>
                </div>
                <button onclick="salvarLancamento()" class="w-full bg-purple-600 p-4 rounded-2xl font-black uppercase text-xs">Registrar</button>
            </div>
        </div>
        <div id="listaTimeline" class="space-y-3"></div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
        <div class="flex justify-between items-center px-2">
            <h3 class="text-xs font-black uppercase italic">Meus Objetivos</h3>
            <div class="flex gap-2">
                <button onclick="verMetasConcluidas()" class="text-[9px] font-black opacity-50 uppercase">🏆 Concluídas</button>
                <button onclick="modalNovaMeta()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ Nova Meta</button>
            </div>
        </div>
        <div id="rankingGrid" class="space-y-6"></div>
    </section>

    <section id="secGestao" class="hidden space-y-6">
        <div class="glass-card p-8 flex flex-col items-center">
            <div class="relative w-full flex justify-center">
                <canvas id="chartGestao" class="max-w-[200px]"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-[8px] font-black opacity-30 uppercase">Total Dívidas</span>
                    <h2 id="totalGestao" class="text-lg font-black text-rose-500">R$ 0</h2>
                </div>
            </div>
        </div>
        <div id="listaDetalhada" class="space-y-2"></div>
    </section>
  </main>
</div>

<button onclick="toggleChat()" class="fixed bottom-[100px] right-6 w-14 h-14 bg-purple-600 rounded-full flex items-center justify-center shadow-2xl z-[1000] text-2xl active:scale-90 transition-all">✨</button>
<div id="chatWindow" class="chat-window glass-card p-4 border-2 border-purple-500/20 shadow-2xl">
    <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
        <h4 class="text-[10px] font-black uppercase tracking-widest text-purple-400">Oracle AI</h4>
        <button onclick="toggleChat()">✕</button>
    </div>
    <div id="chatContent" class="flex-1 overflow-y-auto space-y-3 no-scrollbar mb-4 text-[11px] italic">
        <p class="bg-purple-900/20 p-3 rounded-2xl rounded-tl-none">Analisando dados... Como posso ajudar?</p>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <button onclick="aiMenu('status')" class="bg-white/5 p-2 rounded-xl text-[9px] font-black uppercase">Metas</button>
        <button onclick="aiMenu('previsao')" class="bg-white/5 p-2 rounded-xl text-[9px] font-black uppercase">5º Dia Útil</button>
    </div>
</div>

<nav class="fixed bottom-6 left-6 right-6 glass-card p-2 flex justify-around items-center z-[900] shadow-2xl">
    <button onclick="navegar('secDashboard', this)" class="nav-btn-m active p-3 flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[8px] font-black uppercase">Home</span></button>
    <button onclick="navegar('secMetas', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1"><span class="text-xl">🎯</span><span class="text-[8px] font-black uppercase">Metas</span></button>
    <button onclick="navegar('secGestao', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1"><span class="text-xl">📊</span><span class="text-[8px] font-black uppercase">Gestão</span></button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
