<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetasBoard | Premium Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style type="text/tailwindcss">
    @layer components {
      body { @apply bg-[#0f172a] text-slate-200; font-family: 'Inter', sans-serif; }
      .glass { @apply bg-slate-800/50 backdrop-blur-md border border-white/10; }
      .menuBtn { @apply w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white font-semibold; }
      .menuBtn.active { @apply bg-purple-600/20 text-purple-400; }
      .cardResumo { @apply glass p-4 rounded-2xl border-l-4 shadow-lg; }
      .inputPadrao { @apply w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none text-white; }
      .btnAcao { @apply w-full font-bold p-4 rounded-xl transition-all text-white active:scale-95; }
      .secao { @apply hidden flex-col gap-6 animate-in fade-in duration-500; }
      .secao.ativa { @apply flex; }
    }
  </style>
</head>
<body class="min-h-screen">

  <div id="loginTela" class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-8 rounded-3xl w-full max-w-md">
      <h2 class="text-3xl font-black text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">MetasBoard</h2>
      <div class="space-y-4">
        <input id="email" type="email" placeholder="Email" class="inputPadrao">
        <input id="senha" type="password" placeholder="Senha" class="inputPadrao">
        <button onclick="login()" class="btnAcao bg-purple-600">Entrar</button>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-64 glass p-6 flex flex-col gap-6 border-r border-white/5">
      <h1 class="text-xl font-black text-purple-500 italic"><i class="fas fa-rocket"></i> METASBOARD</h1>
      <nav class="flex md:flex-col gap-2 overflow-x-auto md:overflow-visible pb-2 md:pb-0">
        <button onclick="navegar('secHome')" id="btn-secHome" class="menuBtn active"><i class="fas fa-home"></i> <span class="hidden md:inline">Início</span></button>
        <button onclick="navegar('secDividas')" id="btn-secDividas" class="menuBtn"><i class="fas fa-money-bill-wave"></i> <span class="hidden md:inline">Dívidas</span></button>
        <button onclick="navegar('secMetas')" id="btn-secMetas" class="menuBtn"><i class="fas fa-bullseye"></i> <span class="hidden md:inline">Metas</span></button>
      </nav>
      <button onclick="logout()" class="mt-auto p-4 text-rose-400 font-bold flex items-center gap-2"><i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">Sair</span></button>
    </aside>

    <main class="flex-1 p-4 md:p-10 overflow-y-auto">
      
      <section id="secHome" class="secao ativa">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="cardResumo border-emerald-500"><p class="text-xs font-bold text-slate-400 uppercase">Receitas</p><h3 id="resumoReceita" class="text-xl font-black text-emerald-400">R$ 0,00</h3></div>
          <div class="cardResumo border-rose-500"><p class="text-xs font-bold text-slate-400 uppercase">Despesas</p><h3 id="resumoDespesa" class="text-xl font-black text-rose-400">R$ 0,00</h3></div>
          <div class="cardResumo border-purple-500"><p class="text-xs font-bold text-slate-400 uppercase">Saldo</p><h3 id="resumoSaldo" class="text-xl font-black">R$ 0,00</h3></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="glass p-6 rounded-3xl h-fit">
            <h3 class="font-bold mb-4">Novo Lançamento</h3>
            <div class="space-y-3">
              <input id="lan_desc" placeholder="Ex: Salário, Aluguel" class="inputPadrao">
              <input id="lan_valor" type="number" step="0.01" placeholder="Valor R$" class="inputPadrao">
              <div class="flex gap-2">
                <input id="lan_dia" type="number" placeholder="Dia" class="inputPadrao w-20">
                <select id="lan_tipo" class="inputPadrao">
                  <option value="receita">Receita</option>
                  <option value="despesa">Despesa</option>
                </select>
              </div>
              <button onclick="addMovimento()" class="btnAcao bg-purple-600 hover:bg-purple-500">Salvar</button>
            </div>
          </div>
          <div class="lg:col-span-2 glass rounded-3xl p-6">
            <h3 class="font-bold mb-4 italic text-slate-400">Fluxo Mensal</h3>
            <ul id="listaHome" class="space-y-3"></ul>
          </div>
        </div>
      </section>

      <section id="secDividas" class="secao">
        <h2 class="text-2xl font-black italic">Gestão de Dívidas</h2>
        <div id="listaDividas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </section>

      <section id="secMetas" class="secao">
        <h2 class="text-2xl font-black italic">Minhas Metas</h2>
        <div id="listaMetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
      </section>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
