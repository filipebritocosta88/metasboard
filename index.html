<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetasBoard Ultra Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #000000; --card: #0a0c14; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-card { background: rgba(10, 12, 20, 0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; backdrop-filter: blur(12px); }
    .nav-btn-m.active { color: var(--primary); font-weight: 900; filter: drop-shadow(0 0 8px var(--primary)); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; color: white !important; background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none !important; }
    .hp-bar { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .hp-fill { height: 100%; transition: width 1s ease-in-out; }
    .futuro-badge { border: 1px dashed rgba(168, 85, 247, 0.5); background: rgba(168, 85, 247, 0.05); }
  </style>
</head>
<body class="overflow-x-hidden no-scrollbar">

<div id="loginTela" class="flex items-center justify-center min-h-screen p-6 fixed inset-0 z-[9999] bg-black">
  <div class="glass-card p-10 w-full max-w-md text-center">
    <h1 class="text-4xl font-black mb-2 italic italic">METAS<span class="text-purple-500">BOARD</span></h1>
    <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-8 font-bold">Tecnologia de Gestão Avançada</p>
    <div class="space-y-4">
      <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-2xl">
      <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl">
      <button onclick="login()" id="btnPrincipal" class="w-full bg-white text-black p-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all">Entrar no Sistema</button>
      <button onclick="alternarAuth()" class="text-slate-500 text-[9px] font-black uppercase tracking-widest mt-4">Criar nova conta gratuita</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen pb-28">
  <main class="p-4 md:p-8 max-w-5xl mx-auto space-y-6">
    
    <header class="flex justify-between items-center pt-4">
        <h2 class="text-2xl font-black italic uppercase">Painel <span class="text-purple-500">Home</span></h2>
        <button onclick="logout()" class="p-2 opacity-30 hover:opacity-100 transition-opacity">Sair</button>
    </header>

    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black uppercase tracking-widest">Saúde da Carteira</span>
            <span id="hpStatus" class="text-[10px] font-black uppercase text-emerald-400">Excelente</span>
        </div>
        <div class="hp-bar"><div id="hpFill" class="hp-fill bg-emerald-500" style="width: 100%"></div></div>
        <div class="grid grid-cols-3 gap-2 mt-6">
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Já Recebido</p><h4 id="receitaTotal" class="text-sm font-black text-emerald-400">R$ 0</h4></div>
            <div class="text-center border-x border-white/5"><p class="text-[8px] opacity-40 uppercase font-black">Previsão Saída</p><h4 id="despesaTotal" class="text-sm font-black text-rose-500">R$ 0</h4></div>
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Saldo Livre</p><h4 id="saldoTotal" class="text-sm font-black">R$ 0</h4></div>
        </div>
    </div>

    <section id="secDashboard" class="space-y-6">
        <div class="glass-card p-6">
            <div class="flex gap-4 mb-6 border-b border-white/5 pb-4 overflow-x-auto no-scrollbar">
                <button onclick="mudarTabCadastro('salario')" class="text-[10px] font-black uppercase tracking-widest text-purple-400 whitespace-nowrap">💰 Salário Fixo</button>
                <button onclick="mudarTabCadastro('extra')" class="text-[10px] font-black uppercase tracking-widest opacity-40 whitespace-nowrap">💸 Extra / Dívida</button>
            </div>

            <div id="formCadastro" class="space-y-4">
                <input id="fluxoNome" type="text" placeholder="Ex: Salário Mensal ou Aluguel" class="w-full p-4 rounded-2xl text-xs font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <input id="fluxoValor" type="number" placeholder="Valor R$" class="p-4 rounded-2xl text-xs font-bold">
                    <input id="fluxoData" type="date" class="p-4 rounded-2xl text-[10px]">
                </div>
                <input id="fluxoTipo" type="hidden" value="ganho">
                <button onclick="adicionarFluxo()" class="w-full bg-purple-600 p-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Agendar no Calendário</button>
            </div>
        </div>

        <div id="iaCard" class="glass-card p-6 border-l-4 border-purple-500">
            <h4 class="text-[10px] font-black uppercase text-purple-400 mb-2">✦ Mentor de Viabilidade</h4>
            <p id="iaTexto" class="text-xs italic leading-relaxed opacity-90">Cadastre seu salário e dívidas para eu analisar seu mês.</p>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-black uppercase tracking-widest opacity-40 ml-2">Linha do Tempo</h3>
            <div id="listaTimeline" class="space-y-3">
                </div>
        </div>
    </section>

    </main>
</div>

<nav class="fixed bottom-6 left-6 right-6 glass-card p-2 flex justify-around items-center z-[1000] border-t-white/10 shadow-2xl">
    <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn-m active p-3 flex flex-col items-center gap-1">
        <span class="text-lg">🏠</span><span class="text-[8px] font-black uppercase">Home</span>
    </button>
    <button onclick="mostrarSecao('secMetas', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1">
        <span class="text-lg">🎯</span><span class="text-[8px] font-black uppercase">Metas</span>
    </button>
    <button onclick="mostrarSecao('secDividas', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1">
        <span class="text-lg">📊</span><span class="text-[8px] font-black uppercase">Gestão</span>
    </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
