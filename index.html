<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetasBoard Ultra Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #0b0e14; --card: #161b30; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
    /* Fix login overlay */
    #loginTela { position: fixed; inset: 0; z-index: 9999; background: var(--bg); }
    .nav-btn-m.active { color: var(--primary); font-weight: 900; border-top: 2px solid var(--primary); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; color: white !important; background: rgba(0,0,0,0.4) !important; }
    .mes-dot { height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; transition: 0.3s; }
  </style>
</head>
<body class="no-scrollbar">

<div id="loginTela" class="flex items-center justify-center p-6">
  <div class="glass-card p-8 w-full max-w-md text-center shadow-2xl">
    <h1 class="text-3xl font-black mb-8 italic">METAS<span class="text-purple-500">BOARD</span></h1>
    <div class="space-y-4">
      <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-xl border border-slate-700 outline-none">
      <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-xl border border-slate-700 outline-none">
      <div id="confirmarSenhaContainer" class="hidden">
        <input id="senhaConfirm" type="password" placeholder="Confirme Senha" class="w-full p-4 rounded-xl border border-slate-700 outline-none">
      </div>
      <button id="btnPrincipal" onclick="login()" class="w-full bg-purple-600 p-4 rounded-xl font-black uppercase">Acessar Painel</button>
      <button id="btnAlternar" onclick="alternarAuth()" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-4">Novo? Criar Senha</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen pb-24 md:flex">
  <aside class="hidden md:flex w-64 border-r border-slate-800 p-6 flex-col bg-[#0d111a]">
    <h2 class="text-xl font-black mb-10 italic">METAS<span class="text-purple-500">BOARD</span></h2>
    <nav class="space-y-2">
      <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn active w-full p-3 rounded-lg text-left font-bold">📊 Visão Geral</button>
      <button onclick="mostrarSecao('secMetas', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400">🏆 Metas</button>
      <button onclick="mostrarSecao('secDividas', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400">💳 Gestão</button>
      <button onclick="mostrarSecao('secInvest', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400">🚀 Investir</button>
    </nav>
    <button onclick="logout()" class="mt-auto p-3 text-red-500 font-bold">Sair</button>
  </aside>

  <main class="flex-1 p-4 md:p-8 overflow-y-auto no-scrollbar">
    <div class="glass-card p-4 mb-6 flex flex-wrap gap-3 items-center justify-between">
        <h4 class="text-[10px] font-black uppercase text-purple-400">Período de Análise:</h4>
        <div class="flex gap-2">
            <input type="date" id="dataInicio" class="bg-transparent text-[10px] p-1 border-b border-purple-500">
            <span class="text-xs">até</span>
            <input type="date" id="dataFim" class="bg-transparent text-[10px] p-1 border-b border-purple-500">
            <button onclick="aplicarFiltroData()" class="bg-purple-600 px-3 py-1 rounded-lg text-[10px] font-black">FILTRAR</button>
        </div>
    </div>

    <section id="secDashboard" class="space-y-6">
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <div class="glass-card p-4 border-l-4 border-emerald-500 cursor-pointer" onclick="aplicarFiltroData()">
            <p class="text-[10px] font-black opacity-50 uppercase">Entradas</p>
            <h3 id="receitaTotal" class="text-lg md:text-2xl font-black text-emerald-400">R$ 0,00</h3>
        </div>
        <div class="glass-card p-4 border-l-4 border-rose-500 cursor-pointer" onclick="aplicarFiltroData()">
            <p class="text-[10px] font-black opacity-50 uppercase">Dívidas</p>
            <h3 id="despesaTotal" class="text-lg md:text-2xl font-black text-rose-500">R$ 0,00</h3>
        </div>
        <div class="glass-card p-4 border-l-4 border-purple-500 col-span-2 md:col-span-1">
            <p class="text-[10px] font-black opacity-50 uppercase">Saldo Livre</p>
            <h3 id="saldoTotal" class="text-xl md:text-2xl font-black text-white">R$ 0,00</h3>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="glass-card p-5">
                <h4 class="text-[10px] font-black text-slate-500 uppercase mb-4 text-center">Performance Anual</h4>
                <div id="gridMesesAnual" class="grid grid-cols-6 md:grid-cols-12 gap-2"></div>
            </div>
            <div class="glass-card p-6 bg-gradient-to-br from-purple-900/10 to-transparent border-l-8 border-purple-600">
                <p id="iaTexto" class="text-xs italic opacity-80"></p>
            </div>
        </div>

        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black italic uppercase text-sm">Registrar Fluxo</h3>
                <button onclick="verHistoricoFluxo()" class="w-10 h-10 rounded-full bg-purple-600 text-white font-black text-xl shadow-lg flex items-center justify-center">!</button>
            </div>
            <div class="space-y-3">
                <input id="fluxoNome" type="text" placeholder="Ex: Salário, Aluguel..." class="w-full p-3 rounded-xl border border-white/10">
                <input id="fluxoValor" type="number" placeholder="Valor R$" class="w-full p-3 rounded-xl border border-white/10">
                <div class="grid grid-cols-2 gap-2">
                    <input id="fluxoData" type="date" class="p-3 rounded-xl border border-white/10">
                    <select id="fluxoTipo" class="p-3 rounded-xl border border-white/10">
                        <option value="ganho">Ganho (+)</option>
                        <option value="divida">Dívida (-)</option>
                    </select>
                </div>
                <button onclick="adicionarFluxo()" class="w-full bg-purple-600 p-4 rounded-xl font-black uppercase text-xs">Salvar Registro</button>
            </div>
        </div>
      </div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase">Metas 🏆</h2>
            <button onclick="abrirModalMeta()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-black text-xs uppercase">+ Nova</button>
        </div>
        <div id="rankingGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <section id="secDividas" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-6 flex flex-col items-center">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-6">Gráfico de Débitos</h3>
                <div class="relative w-56 h-56">
                    <canvas id="chartDividas"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="chartTotalLabel" class="text-xl font-black text-rose-500">R$ 0</span>
                    </div>
                </div>
            </div>
            <div id="listaDividasDetalhada" class="space-y-3"></div>
        </div>
    </section>

    <section id="secInvest" class="hidden max-w-2xl mx-auto space-y-6">
        <div class="glass-card p-8 border-l-8 border-emerald-500">
            <h2 class="text-2xl font-black mb-4 uppercase italic">Sugestões de Investimento</h2>
            <p class="text-xs text-slate-400 mb-6">Baseado no saldo de: <b id="saldoInvestLabel" class="text-white">R$ 0,00</b></p>
            <button onclick="analisarInvestimentoIA()" class="w-full bg-emerald-600 p-4 rounded-xl font-black uppercase">Gerar Análise Agora</button>
        </div>
        <div id="boxResultadoInvest" class="hidden glass-card p-6 space-y-4"></div>
    </section>
  </main>
</div>

<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0d111a]/95 backdrop-blur-lg border-t border-slate-800 flex justify-around p-3 z-[1000]">
    <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn-m active text-[10px] flex flex-col items-center gap-1"><span>📊</span>Início</button>
    <button onclick="mostrarSecao('secMetas', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>🏆</span>Metas</button>
    <button onclick="mostrarSecao('secDividas', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>💳</span>Gestão</button>
    <button onclick="mostrarSecao('secInvest', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>🚀</span>Investir</button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
