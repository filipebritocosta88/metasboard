<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MetasBoard | OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #a855f7; --bg: #050505; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    
    #loginTela { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(15px); }
    
    /* HUD Saúde Refinado */
    .hp-container { background: linear-gradient(180deg, rgba(168,85,247,0.1) 0%, rgba(0,0,0,0) 100%); border-top: 1px solid rgba(168,85,247,0.3); }
    .hp-bar-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
    #hpFill { height: 100%; width: 0%; background: var(--p); box-shadow: 0 0 15px var(--p); transition: width 1.5s ease; }
    
    .nav-active { color: var(--p); position: relative; opacity: 1 !important; }
    .nav-active::after { content: ''; position: absolute; bottom: -12px; width: 4px; height: 4px; background: var(--p); border-radius: 50%; box-shadow: 0 0 10px var(--p); }
    
    .blur-mode .money { filter: blur(12px); pointer-events: none; }
    
    input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 16px !important; transition: 0.3s; }
    input:focus { border-color: var(--p) !important; background: rgba(168,85,247,0.05) !important; }

    .btn-main { background: linear-gradient(135deg, #a855f7, #7c3aed); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3); }
    
    .mic-btn.recording { background: #ef4444 !important; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    
    .hidden { display: none !important; }
    .card-entry { animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="loginTela">
    <h1 class="font-orbitron text-4xl mb-2 tracking-widest">METAS<span class="text-purple-500">BOARD</span></h1>
    <p class="text-[10px] opacity-40 uppercase tracking-[0.3em] mb-10">Ecosistema Pessoal</p>
    
    <div class="glass p-8 w-full max-w-sm space-y-4">
        <div id="authHeader" class="text-center mb-6">
            <h2 id="authTitle" class="font-bold text-lg">Bem-vindo de volta</h2>
            <p id="authSubtitle" class="text-xs opacity-50">Acesse seu terminal estratégico</p>
        </div>
        <input id="email" type="email" placeholder="E-mail" class="w-full p-4 text-sm">
        <input id="senha" type="password" placeholder="Senha" class="w-full p-4 text-sm">
        <button onclick="executarAuth()" id="btnAuth" class="btn-main w-full p-4 rounded-2xl font-black uppercase tracking-widest text-[11px]">Entrar no Sistema</button>
        <button onclick="alternarAuth()" id="txtAuth" class="w-full text-center text-[10px] opacity-40 uppercase font-bold py-2 hover:opacity-100 transition-all">Novo por aqui? Criar Conta</button>
    </div>
</div>

<div id="app" class="hidden min-h-screen pb-32">
    <header class="p-8 flex justify-between items-start max-w-2xl mx-auto">
        <div>
            <h2 class="font-orbitron text-xl uppercase tracking-tighter">METAS<span class="text-purple-500">BOARD</span></h2>
            <p id="dataRef" class="text-[10px] text-purple-400 font-bold uppercase mt-1"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="document.body.classList.toggle('blur-mode')" class="glass p-3 text-lg hover:bg-white/10 transition-all">👁️</button>
            <button onclick="sair()" class="glass px-4 py-2 text-[10px] font-black text-rose-500 border border-rose-500/20 hover:bg-rose-500/10 transition-all">SAIR</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 space-y-6">
        <div class="glass hp-container p-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[9px] font-black uppercase tracking-widest opacity-60">Status de Operação</span>
                <span id="hpTexto" class="text-[10px] font-orbitron px-3 py-1 rounded-full bg-white/5 border border-white/10">---</span>
            </div>
            
            <div class="grid grid-cols-2 gap-8 mb-8">
                <div class="space-y-1">
                    <p class="text-[9px] opacity-40 uppercase font-bold">Saldo Disponível</p>
                    <h4 id="saldoReal" class="money font-orbitron text-3xl">R$ 0</h4>
                </div>
                <div class="space-y-1 text-right">
                    <p class="text-[9px] opacity-40 uppercase font-bold text-emerald-500">Previsto</p>
                    <h4 id="txtPrevisto" class="money font-orbitron text-xl text-emerald-400">R$ 0</h4>
                </div>
            </div>

            <div class="hp-bar-bg"><div id="hpFill"></div></div>
            
            <div class="flex justify-between mt-4">
                <div class="flex gap-4">
                    <div><p class="text-[8px] opacity-30 uppercase font-bold">Renda</p><p id="txtReceita" class="money text-white text-xs font-bold">R$ 0</p></div>
                    <div><p class="text-[8px] opacity-30 uppercase font-bold">Saídas</p><p id="txtDespesa" class="money text-white text-xs font-bold">R$ 0</p></div>
                </div>
                <div class="text-right"><p class="text-[8px] opacity-30 uppercase font-bold">HP</p><p id="hpPorcentagem" class="text-purple-400 text-xs font-black">0%</p></div>
            </div>
        </div>

        <section id="secHome" class="space-y-4">
            <div class="glass p-6 space-y-5 border-t border-white/5">
                <div class="flex justify-between items-center">
                    <div class="flex bg-black/40 p-1.5 rounded-xl gap-1">
                        <button onclick="mudarTipo('divida')" id="t-div" class="text-[9px] px-5 py-2 rounded-lg bg-purple-600 font-black transition-all">GASTO</button>
                        <button onclick="mudarTipo('ganho')" id="t-gan" class="text-[9px] px-5 py-2 rounded-lg opacity-30 font-black transition-all">RENDA</button>
                    </div>
                    <button id="audioBtn" onclick="toggleAudio()" class="mic-btn glass p-3 rounded-2xl bg-purple-500/10 border border-purple-500/20 text-xl">🎤</button>
                </div>
                
                <div class="space-y-3">
                    <input id="masterInput" type="text" oninput="ajudaInteligente(this.value)" placeholder="O que você comprou?" class="w-full p-4 text-sm font-semibold">
                    <div class="flex gap-2">
                        <input id="valManual" type="number" placeholder="0.00" class="w-1/2 p-4 text-sm font-bold">
                        <input id="dateManual" type="date" class="w-1/2 p-4 text-[11px] opacity-60">
                    </div>
                </div>

                <div id="cats" class="flex justify-around p-2 bg-black/20 rounded-2xl">
                    <button onclick="setCat('🛒')" class="text-xl p-2 grayscale hover:grayscale-0 transition-all">🛒</button>
                    <button onclick="setCat('🍔')" class="text-xl p-2 grayscale hover:grayscale-0 transition-all">🍔</button>
                    <button onclick="setCat('🏠')" class="text-xl p-2 grayscale hover:grayscale-0 transition-all">🏠</button>
                    <button onclick="setCat('🚀')" class="text-xl p-2 grayscale hover:grayscale-0 transition-all">🚀</button>
                    <button onclick="setCat('💳')" class="text-xl p-2 grayscale hover:grayscale-0 transition-all">💳</button>
                </div>

                <button onclick="salvar()" class="btn-main w-full p-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em]">Registrar Operação</button>
            </div>
            <div id="feed" class="space-y-3 pb-10"></div>
        </section>

        <section id="secMetas" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-orbitron text-sm tracking-widest">OBJETIVOS</h3>
                <button class="glass px-4 py-2 text-[10px] font-bold">+ NOVO</button>
            </div>
            <div class="glass p-12 text-center opacity-30 border-dashed border-2">
                <p class="text-xs uppercase font-bold">Módulo de Metas em Sincronização</p>
            </div>
        </section>

        <section id="secGestao" class="hidden space-y-6">
            <h3 class="font-orbitron text-sm tracking-widest">ESTRATÉGIA</h3>
            <div class="glass p-6 h-40 flex items-center justify-center opacity-30">
                <p class="text-xs uppercase font-bold">Relatórios Avançados Indisponíveis</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass rounded-none border-t border-white/10 p-5 flex justify-around items-center z-50">
        <button onclick="nav('secHome', this)" class="nav-active flex flex-col items-center gap-2 opacity-40 transition-all"><span class="text-xl">🏠</span><p class="text-[8px] font-black uppercase tracking-tighter">Terminal</p></button>
        <button onclick="nav('secMetas', this)" class="flex flex-col items-center gap-2 opacity-40 transition-all"><span class="text-xl">🎯</span><p class="text-[8px] font-black uppercase tracking-tighter">Objetivos</p></button>
        <button onclick="nav('secGestao', this)" class="flex flex-col items-center gap-2 opacity-40 transition-all"><span class="text-xl">📊</span><p class="text-[8px] font-black uppercase tracking-tighter">Gestão</p></button>
    </nav>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
