<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MetasBoard | Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --p: #a855f7; --bg: #050505; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; backdrop-filter: blur(10px); }
    
    /* Progress Bar Metas */
    .progress-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--p); box-shadow: 0 0 10px var(--p); transition: width 1s ease; }
    
    .nav-active { color: var(--p); opacity: 1 !important; transform: translateY(-3px); }
    .blur-mode .money { filter: blur(12px); opacity: 0.2; }
    
    input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px !important; outline: none; }
    .btn-main { background: linear-gradient(135deg, #a855f7, #7c3aed); transition: 0.3s; }
    .mic-btn.recording { background: #ef4444 !important; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-[#050505]">

<div id="loginTela" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-6 text-center">
    <h1 class="font-orbitron text-4xl mb-2 tracking-[0.3em]">METAS<span class="text-purple-500">BOARD</span></h1>
    <div class="glass p-8 w-full max-w-sm space-y-4">
        <input id="email" type="email" placeholder="E-mail" class="w-full p-4">
        <input id="senha" type="password" placeholder="Senha" class="w-full p-4">
        <button onclick="executarAuth()" id="btnAuth" class="btn-main w-full p-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Entrar</button>
        <p onclick="alternarAuth()" id="txtAuth" class="text-[9px] opacity-40 uppercase cursor-pointer">Criar nova conta</p>
    </div>
</div>

<div id="app" class="hidden min-h-screen pb-32">
    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto">
        <div>
            <h2 class="font-orbitron text-lg tracking-tighter">METAS<span class="text-purple-500">BOARD</span></h2>
            <p id="dataRef" class="text-[9px] text-purple-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="document.body.classList.toggle('blur-mode')" class="glass p-3">👁️</button>
            <button onclick="sair()" class="glass px-4 py-2 text-[10px] text-rose-500 font-bold">SAIR</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 space-y-6">
        <section id="secHome" class="space-y-6">
            <div class="glass p-6 space-y-4 border-t-2 border-purple-500/30">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[8px] opacity-40 uppercase font-black">Saldo em Conta</p>
                        <h3 id="saldoReal" class="money font-orbitron text-3xl">R$ 0</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] opacity-40 uppercase font-black text-emerald-500">Próximo Salário (5º DU)</p>
                        <h4 id="txtProximoSalario" class="money font-orbitron text-lg text-emerald-400">R$ 0</h4>
                    </div>
                </div>
                <div class="progress-bg"><div id="hpFill" class="progress-fill" style="width: 0%"></div></div>
            </div>

            <div class="glass p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <div class="flex bg-black/40 p-1 rounded-lg gap-1">
                        <button onclick="mudarTipo('divida')" id="t-div" class="text-[9px] px-4 py-1.5 rounded-md bg-purple-600 font-black">GASTO</button>
                        <button onclick="mudarTipo('ganho')" id="t-gan" class="text-[9px] px-4 py-1.5 rounded-md opacity-30 font-black">RENDA</button>
                    </div>
                    <button id="audioBtn" onclick="toggleAudio()" class="mic-btn glass p-3 rounded-xl border-purple-500/20 text-xl">🎤</button>
                </div>
                <input id="masterInput" type="text" placeholder="Fale ou digite (ex: Uber 25)" class="w-full p-4 text-sm font-semibold">
                <div class="flex gap-2">
                    <input id="valManual" type="number" placeholder="0.00" class="w-1/2 p-4 text-sm">
                    <input id="dateManual" type="date" class="w-1/2 p-4 text-[10px]">
                </div>
                <button onclick="salvar()" class="btn-main w-full p-4 rounded-xl font-black text-[10px] tracking-widest uppercase">Registrar</button>
            </div>

            <div id="feed" class="space-y-3"></div>
        </section>

        <section id="secMetas" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-orbitron text-sm tracking-widest">OBJETIVOS</h3>
                <button onclick="abrirModalMeta()" class="btn-main px-4 py-2 rounded-lg text-[9px] font-black uppercase">+ Criar Meta</button>
            </div>
            <div id="listaMetas" class="space-y-4"></div>
        </section>

        <section id="secGestao" class="hidden space-y-6">
            <h3 class="font-orbitron text-sm tracking-widest uppercase">Inteligência de Gestão</h3>
            
            <div class="glass p-6 h-64">
                <canvas id="meuGrafico"></canvas>
            </div>

            <div class="glass p-6 space-y-4">
                <h4 class="text-[10px] font-black uppercase text-purple-400">Configuração de Salário</h4>
                <div class="flex gap-2">
                    <input id="inputSalarioBase" type="number" placeholder="Valor do Salário" class="w-full p-3 text-sm">
                    <button onclick="configurarSalario()" class="btn-main px-6 rounded-xl font-bold text-[9px]">SALVAR</button>
                </div>
                <p class="text-[8px] opacity-40 uppercase">O sistema depositará automaticamente no 5º dia útil de cada mês.</p>
            </div>

            <div id="mentorDicas" class="glass p-6 border-l-4 border-emerald-500 bg-emerald-500/5">
                <p class="text-[10px] font-black uppercase mb-2">Mentor MetasBoard 🤖</p>
                <p id="textoMentor" class="text-xs opacity-70 leading-relaxed italic">Analisando seu comportamento financeiro...</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass rounded-none border-t border-white/10 p-6 flex justify-around items-center z-50">
        <button onclick="nav('secHome', this)" class="nav-active flex flex-col items-center gap-1 opacity-40 transition-all"><span class="text-xl">🏠</span><p class="text-[8px] font-black uppercase">Home</p></button>
        <button onclick="nav('secMetas', this)" class="flex flex-col items-center gap-1 opacity-40 transition-all"><span class="text-xl">🎯</span><p class="text-[8px] font-black uppercase">Metas</p></button>
        <button onclick="nav('secGestao', this)" class="flex flex-col items-center gap-2 opacity-40 transition-all"><span class="text-xl">📊</span><p class="text-[8px] font-black uppercase">Gestão</p></button>
    </nav>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
