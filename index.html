<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metasboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 90%;
            max-width: 800px;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .logo span { color: var(--accent-purple); }

        .date-display {
            color: var(--accent-purple);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .main-card {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #222;
            margin-bottom: 20px;
        }

        .wallet-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .balance-label { color: var(--text-secondary); font-size: 0.7rem; margin-bottom: 5px; }
        .balance-value { font-size: 2.5rem; font-weight: bold; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.03);
        }

        .stat-item.in { border-left: 4px solid var(--accent-green); }
        .stat-item.out { border-left: 4px solid var(--accent-red); }

        .stat-label { font-size: 0.6rem; color: var(--text-secondary); margin-bottom: 5px; }
        .stat-val { font-size: 1.1rem; font-weight: bold; }

        .projection-bar {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .projection-val { color: #f97316; font-weight: bold; }

        .list-container {
            width: 90%;
            max-width: 800px;
            margin-bottom: 100px;
        }

        .section-title {
            color: var(--accent-red);
            font-size: 0.7rem;
            font-weight: bold;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
        }

        .item-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #222;
        }

        .item-info .name { font-weight: bold; display: block; }
        .item-info .date { font-size: 0.7rem; color: var(--text-secondary); }
        .item-price { color: var(--accent-green); font-weight: bold; }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px dashed #444;
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h2 { margin-top: 0; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-ok {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #222;
        }

        .nav-item { color: var(--text-secondary); text-align: center; font-size: 0.6rem; cursor: pointer; }
        .nav-item.active { color: var(--accent-purple); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">METAS<span>BOARD</span></div>
        <div class="date-display" id="currentDate">QUINTA-FEIRA, 12 DE MARÇO</div>
    </header>

    <div class="main-card">
        <div class="wallet-section">
            <div>
                <div class="balance-label">CARTEIRA (HOJE)</div>
                <div class="balance-value" id="walletBalance">R$ 0,00</div>
            </div>
            <div style="text-align: right;">
                <div class="balance-label">PREVISTO MÊS</div>
                <div class="balance-value" style="font-size: 1.5rem; color: #b794f4;" id="plannedMonth">R$ 0,00</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item in">
                <div class="stat-label">ENTRADAS MÊS</div>
                <div class="stat-val" id="monthlyIn">R$ 0,00</div>
            </div>
            <div class="stat-item out">
                <div class="stat-label">SAÍDAS MÊS</div>
                <div class="stat-val" id="monthlyOut">R$ 0,00</div>
            </div>
        </div>

        <div class="projection-bar">
            <div class="stat-label" style="margin:0">PROJEÇÃO PRÓXIMO MÊS</div>
            <div class="projection-val" id="nextMonthProj">R$ 0,00</div>
        </div>
    </div>

    <div class="list-container">
        <div class="section-title">DÍVIDAS FIXAS (RECORRENTES)</div>
        <div id="fixedList"></div>
        <button class="btn-add" onclick="openModal()">+ Add Conta Fixa</button>
    </div>

    <div class="modal" id="modalDivida">
        <div class="modal-content">
            <h2>Nova Dívida Fixa</h2>
            <input type="text" id="descInput" placeholder="Ex: Aluguel">
            <input type="number" id="valInput" placeholder="Valor R$">
            <input type="text" id="dateInput" placeholder="Dia do Vencimento (ex: 15)">
            <br>
            <button class="btn-ok" onclick="saveFixed()">OK</button>
        </div>
    </div>

    <nav>
        <div class="nav-item">
            <i class="fas fa-bullseye"></i>
            METAS
        </div>
        <div class="nav-item active">
            <i class="fas fa-wallet"></i>
            GESTÃO
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
