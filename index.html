<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetasBoard Ultra Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #000000; --card: #0a0c14; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-card { background: rgba(10, 12, 20, 0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; backdrop-filter: blur(12px); }
    .nav-btn-m.active { color: var(--primary); font-weight: 900; filter: drop-shadow(0 0 8px var(--primary)); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; color: white !important; background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none !important; transition: all 0.3s; }
    input:focus { border-color: var(--primary) !important; background: rgba(255,255,255,0.08) !important; }
    .hp-bar { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .hp-fill { height: 100%; transition: width 1s ease-in-out, background 0.5s; }
    .badge-glow { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
  </style>
</head>
<body class="overflow-x-hidden no-scrollbar">

<div id="loginTela" class="flex items-center justify-center min-h-screen p-6 fixed inset-0 z-[9999] bg-black">
  <div class="glass-card p-10 w-full max-w-md text-center shadow-2xl border-t-purple-500/30 border-t-2">
    <h1 class="text-4xl font-black mb-2 italic tracking-tighter italic">METAS<span class="text-purple-500">BOARD</span></h1>
    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-8 font-bold">The Strategic Interface</p>
    <div class="space-y-4">
      <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-2xl">
      <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl">
      <div id="confirmarSenhaContainer" class="hidden"><input id="senhaConfirm" type="password" placeholder="Confirmar" class="w-full p-4 rounded-2xl"></div>
      <button onclick="login()" id="btnPrincipal" class="w-full bg-white text-black p-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-transform">Acessar Sistema</button>
      <button onclick="alternarAuth()" class="text-slate-500 text-[9px] font-black uppercase tracking-widest mt-4">Criar nova conta</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen pb-28">
  <main class="p-4 md:p-8 max-w-5xl mx-auto space-y-6">
    
    <header class="flex justify-between items-end pt-4">
        <div>
            <h2 class="text-2xl font-black italic uppercase leading-none">Status <span class="text-purple-500">Atual</span></h2>
            <div class="flex items-center gap-2 mt-2">
                <div class="live-dot"></div>
                <span class="text-[9px] font-black uppercase tracking-widest opacity-40">Sistema Online</span>
            </div>
        </div>
        <button onclick="logout()" class="p-2 opacity-30 hover:opacity-100 transition-opacity">🚪</button>
    </header>

    <div class="glass-card p-6 border-b-2 border-b-purple-500/20">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black uppercase tracking-widest">Financial HP</span>
            <span id="hpStatus" class="text-[10px] font-black uppercase text-emerald-400">Excelente</span>
        </div>
        <div class="hp-bar"><div id="hpFill" class="hp-fill bg-emerald-500" style="width: 100%"></div></div>
        <div class="grid grid-cols-3 gap-2 mt-6">
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Entradas</p><h4 id="receitaTotal" class="text-sm font-black text-emerald-400">R$ 0</h4></div>
            <div class="text-center border-x border-white/5"><p class="text-[8px] opacity-40 uppercase font-black">Gastos</p><h4 id="despesaTotal" class="text-sm font-black text-rose-500">R$ 0</h4></div>
            <div class="text-center"><p class="text-[8px] opacity-40 uppercase font-black">Cash</p><h4 id="saldoTotal" class="text-sm font-black">R$ 0</h4></div>
        </div>
    </div>

    <section id="secDashboard" class="space-y-6">
        <div class="glass-card p-6 relative overflow-hidden group">
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-purple-600/10 rounded-full blur-2xl group-hover:bg-purple-600/20 transition-all"></div>
            <h4 class="text-[10px] font-black uppercase text-purple-400 mb-3 flex items-center gap-2">
                <span>✦</span> Mentor Estratégico
            </h4>
            <p id="iaTexto" class="text-xs italic leading-relaxed opacity-90">Sincronizando dados...</p>
        </div>

        <div class="glass-card p-6">
            <h3 class="text-[10px] font-black uppercase mb-4 opacity-40 tracking-[0.2em]">Quick Entry</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input id="fluxoNome" type="text" placeholder="Descrição" class="p-4 rounded-2xl text-xs font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <input id="fluxoValor" type="number" placeholder="R$" class="p-4 rounded-2xl text-xs font-bold">
                    <input id="fluxoData" type="date" class="p-4 rounded-2xl text-[10px]">
                </div>
                <select id="fluxoTipo" class="p-4 rounded-2xl text-xs font-bold uppercase">
                    <option value="ganho">Entrada (+)</option>
                    <option value="divida">Dívida (-)</option>
                </select>
                <button onclick="adicionarFluxo()" class="bg-purple-600 p-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-purple-900/20 active:scale-95 transition-all">Salvar Registro</button>
            </div>
        </div>

        <div id="conquistasGrid" class="flex gap-4 overflow-x-auto no-scrollbar py-2">
            </div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
        <div class="flex justify-between items-center px-2">
            <h3 class="text-xs font-black uppercase tracking-widest">Objetivos Ativos</h3>
            <button onclick="abrirModalMeta()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">Novo Alvo</button>
        </div>
        <div id="rankingGrid" class="space-y-4"></div>
    </section>

    <section id="secDividas" class="hidden space-y-6">
        <div class="glass-card p-8 flex flex-col items-center">
            <canvas id="chartDividas" class="max-w-[200px]"></canvas>
            <h2 id="chartTotalLabel" class="text-2xl font-black mt-4">R$ 0</h2>
            <p class="text-[9px] uppercase font-black opacity-30 mt-1">Comprometimento Mensal</p>
            <button onclick="abrirCofre()" class="mt-8 text-[9px] font-black uppercase border border-white/10 px-6 py-3 rounded-full hover:bg-white hover:text-black transition-all">📁 Ver Arquivo Morto</button>
        </div>
        <div id="listaDividasDetalhada" class="space-y-3"></div>
    </section>

    <section id="secInvest" class="hidden space-y-6">
        <div class="glass-card p-6">
            <h3 class="text-xs font-black uppercase mb-4">Projeção Composta</h3>
            <div class="space-y-4">
                <input id="simuMes" type="number" placeholder="Quanto por mês?" class="w-full p-4 rounded-2xl">
                <input id="simuAnos" type="number" placeholder="Quantos anos?" class="w-full p-4 rounded-2xl">
                <button onclick="simularJuros()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black uppercase text-xs">Simular Riqueza</button>
            </div>
            <div id="resSimulador" class="mt-6 p-6 bg-white/5 rounded-3xl hidden text-center animate-bounce-short"></div>
        </div>
    </section>

  </main>
</div>

<nav class="fixed bottom-6 left-6 right-6 glass-card p-2 flex justify-around items-center z-[1000] border-t-white/10 shadow-2xl">
    <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn-m active p-3 flex flex-col items-center gap-1">
        <span class="text-lg">📊</span><span class="text-[8px] font-black uppercase">Home</span>
    </button>
    <button onclick="mostrarSecao('secMetas', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1">
        <span class="text-lg">🎯</span><span class="text-[8px] font-black uppercase">Alvos</span>
    </button>
    <button onclick="mostrarSecao('secDividas', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1">
        <span class="text-lg">💳</span><span class="text-[8px] font-black uppercase">Gestão</span>
    </button>
    <button onclick="mostrarSecao('secInvest', this)" class="nav-btn-m p-3 flex flex-col items-center gap-1">
        <span class="text-lg">🚀</span><span class="text-[8px] font-black uppercase">Wealth</span>
    </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
