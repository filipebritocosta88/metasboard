<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MetasBoard Ultra Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #000000; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0; padding: 0; }
    
    #loginTela { position: fixed; inset: 0; z-index: 99999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    
    .glass-card { background: rgba(10, 12, 20, 0.8); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; backdrop-filter: blur(15px); }
    .nav-btn-m.active { color: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); }
    
    input { font-size: 16px !important; background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; transition: all 0.3s; }
    input:focus { border-color: var(--primary) !important; background: rgba(168, 85, 247, 0.05) !important; }
    
    .hp-bar { height: 8px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .hp-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .cat-btn { border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; opacity: 0.4; }
    .cat-btn.active { background: var(--primary); border-color: var(--primary); transform: scale(1.05); opacity: 1; }

    .blur-mode .money-val { filter: blur(8px); pointer-events: none; }
    #dashboard { display: none; opacity: 0; transition: opacity 0.4s ease; }
    .show-dash { display: block !important; opacity: 1 !important; }

    .mission-badge { background: linear-gradient(90deg, #a855f7, #6366f1); padding: 2px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; }
    
    .tutorial-highlight { outline: 3px solid #a855f7 !important; outline-offset: 4px; z-index: 10001 !important; position: relative; }
  </style>
</head>
<body class="no-scrollbar">

<div id="loginTela">
    <div class="w-full max-w-sm space-y-8">
        <h1 class="text-5xl font-black italic tracking-tighter text-center">METAS<span class="text-purple-500">BOARD</span></h1>
        <div class="glass-card p-8 space-y-4">
            <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-2xl">
            <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl">
            <button onclick="executarAuth()" id="btnAcessar" class="w-full bg-white text-black p-4 rounded-2xl font-black uppercase text-xs">Acessar Terminal</button>
            <button onclick="alternarModoAuth()" id="btnTrocarAuth" class="w-full text-[9px] font-black uppercase opacity-40 text-center w-full block mt-4">Criar Novo ID</button>
        </div>
    </div>
</div>

<div id="dashboard" class="min-h-screen pb-40">
  <main class="p-4 md:p-8 max-w-2xl mx-auto space-y-6">
    
    <header class="flex justify-between items-center py-4">
        <div class="flex flex-col">
            <div class="flex items-center gap-2">
                <h2 class="text-xl font-black italic uppercase">Home</h2>
                <span class="mission-badge">ACTIVE</span>
            </div>
            <p id="dataHoje" class="text-[9px] opacity-40 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAnonimo()" class="bg-white/5 p-3 rounded-xl border border-white/10">👁️</button>
            <button onclick="sairDoSistema()" class="bg-rose-500/10 text-rose-500 p-3 rounded-xl text-[10px] font-black uppercase font-black">Sair</button>
        </div>
    </header>

    <div id="step-saude" class="glass-card p-6">
        <p class="text-[7px] font-black opacity-30 uppercase mb-1">Saúde Patrimonial</p>
        <h3 id="txtSaude" class="text-xs font-black text-emerald-400 mb-2">CALCULANDO...</h3>
        <div class="hp-bar"><div id="hpFill" class="hp-fill bg-emerald-500" style="width: 100%"></div></div>
        <div class="grid grid-cols-3 gap-2 mt-6">
            <div class="text-center"><p class="text-[7px] opacity-40 uppercase font-black">Renda</p><h4 id="receitaTotal" class="money-val text-xs font-black text-emerald-400">R$ 0</h4></div>
            <div class="text-center border-x border-white/5"><p class="text-[7px] opacity-40 uppercase font-black">Saldo</p><h4 id="saldoReal" class="money-val text-xs font-black text-purple-400">R$ 0</h4></div>
            <div class="text-center"><p class="text-[7px] opacity-40 uppercase font-black">Saídas</p><h4 id="despesaTotal" class="money-val text-xs font-black text-rose-500">R$ 0</h4></div>
        </div>
    </div>

    <section id="secDashboard" class="space-y-6">
        <div id="step-registro" class="glass-card p-6 space-y-4 border-t-2 border-purple-500">
            <div class="flex justify-between items-center">
                <div class="flex gap-4">
                    <button onclick="setTipo('ganho')" id="tabGanho" class="text-[10px] font-black uppercase opacity-40">💰 Ganho</button>
                    <button onclick="setTipo('divida')" id="tabDivida" class="text-[10px] font-black uppercase text-purple-500 border-b-2 border-purple-500">💸 Saída</button>
                </div>
            </div>
            
            <input id="smartInput" type="text" oninput="processarComando(this.value)" placeholder="O que você gastou? Ex: Uber 25" class="w-full p-4 rounded-xl text-sm font-bold">
            
            <div class="grid grid-cols-2 gap-2">
                <input id="fValorManual" type="number" placeholder="Valor R$" class="p-4 rounded-xl text-xs">
                <input id="fData" type="date" class="p-4 rounded-xl text-[10px]">
            </div>

            <div class="flex items-center gap-2 px-1">
                <input type="checkbox" id="checkSalario" class="w-4 h-4 rounded">
                <label for="checkSalario" class="text-[9px] font-black uppercase opacity-60">Salário (5º dia útil)</label>
            </div>

            <div class="grid grid-cols-4 gap-2 pt-2">
                <button onclick="setCat('🛒', this)" class="cat-btn p-3 rounded-xl text-xl">🛒</button>
                <button onclick="setCat('🏠', this)" class="cat-btn p-3 rounded-xl text-xl">🏠</button>
                <button onclick="setCat('🍔', this)" class="cat-btn p-3 rounded-xl text-xl">🍔</button>
                <button onclick="setCat('🚀', this)" class="cat-btn p-3 rounded-xl text-xl">🚀</button>
            </div>

            <button onclick="salvarLancamento()" class="w-full bg-purple-600 p-4 rounded-xl font-black uppercase text-xs active:scale-95 shadow-lg shadow-purple-500/20">Registrar no Sistema</button>
        </div>
        <div id="listaTimeline" class="space-y-3"></div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
        <div class="flex justify-between items-center px-2">
            <h3 class="text-xs font-black uppercase italic">Objetivos</h3>
            <button onclick="modalNovaMeta()" class="bg-white text-black px-4 py-2 rounded-lg text-[9px] font-black uppercase">+ Meta</button>
        </div>
        <div id="rankingGrid" class="space-y-4"></div>
    </section>

    <section id="secGestao" class="hidden space-y-6">
        <div class="glass-card p-8 flex flex-col items-center">
            <canvas id="chartGestao" class="max-w-[180px]"></canvas>
            <h2 id="totalGestao" class="money-val text-xl font-black mt-4 text-rose-500">R$ 0</h2>
        </div>
    </section>

  </main>
</div>

<nav class="fixed bottom-6 left-6 right-6 glass-card p-2 flex justify-around items-center z-[900] border border-white/10">
    <button onclick="navegar('secDashboard', this)" class="nav-btn-m active p-3 flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[8px] font-black uppercase">Home</span></button>
    <button onclick="navegar('secMetas', this)" class="nav-btn-m p-3 flex flex-col items-center"><span class="text-xl">🎯</span><span class="text-[8px] font-black uppercase">Metas</span></button>
    <button onclick="navegar('secGestao', this)" class="nav-btn-m p-3 flex flex-col items-center"><span class="text-xl">📊</span><span class="text-[8px] font-black uppercase">Gestão</span></button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
