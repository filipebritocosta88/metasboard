<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MetasBoard</title>
  <script type="module" src="app.js" defer></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #1e293b;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border: none;
      background: #334155;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar button:hover {
      background: #475569;
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: bold;
    }

    .green {
      background: #dcfce7;
      color: #166534;
    }

    .red {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>MetasBoard</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('contas')">Contas</button>
    <button onclick="showPage('dividas')">Dívidas</button>
    <button onclick="showPage('metas')">Metas</button>
  </div>

  <div class="content" id="appContent">
  </div>

</body>
</html>
