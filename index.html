<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetasBoard | Inteligência Financeira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style type="text/tailwindcss">
    @layer components {
      body { @apply bg-[#0f172a] text-slate-200 font-sans; }
      .glass { @apply bg-slate-800/60 backdrop-blur-lg border border-white/10 shadow-2xl; }
      .menuBtn { @apply w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white font-semibold; }
      .menuBtn.active { @apply bg-purple-600/20 text-purple-400 border border-purple-500/30; }
      .cardResumo { @apply glass p-5 rounded-2xl border-l-4 shadow-xl; }
      .inputPadrao { @apply w-full p-3 rounded-xl bg-slate-900/50 border border-slate-700 focus:border-purple-500 outline-none text-white; }
      .btnAcao { @apply w-full font-bold p-4 rounded-xl transition-all text-white shadow-lg active:scale-95 hover:brightness-110; }
      .secao { @apply hidden flex-col gap-6 opacity-0 transition-opacity duration-300; }
      .secao.ativa { @apply flex opacity-100; }
    }
  </style>
</head>
<body class="min-h-screen">

  <div id="loginTela" class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-10 rounded-3xl w-full max-w-md">
      <div class="text-center mb-8">
        <h2 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">MetasBoard</h2>
        <p class="text-slate-400 text-sm mt-2">Gestão Financeira Inteligente</p>
      </div>
      <div class="space-y-4">
        <input id="email" type="email" placeholder="Seu email" class="inputPadrao">
        <input id="senha" type="password" placeholder="Sua senha" class="inputPadrao">
        <button onclick="login()" class="btnAcao bg-purple-600">Acessar Painel</button>
        <button onclick="registrar()" class="w-full text-slate-500 text-xs hover:text-purple-400">Não tem conta? Cadastre-se agora</button>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden flex-col md:flex-row min-h-screen">
    
    <aside class="w-full md:w-72 glass p-6 flex flex-col gap-8 border-r border-white/5">
      <div class="flex items-center gap-3 px-2">
        <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-rocket text-white"></i></div>
        <h1 class="text-xl font-black text-white tracking-tight">METASBOARD</h1>
      </div>

      <nav class="flex md:flex-col gap-2 overflow-x-auto">
        <button onclick="navegar('secHome')" id="btn-secHome" class="menuBtn active"><i class="fas fa-th-large w-5"></i> Dashboard</button>
        <button onclick="navegar('secDividas')" id="btn-secDividas" class="menuBtn"><i class="fas fa-hand-holding-usd w-5"></i> Dívidas</button>
        <button onclick="navegar('secMetas')" id="btn-secMetas" class="menuBtn"><i class="fas fa-bullseye w-5"></i> Metas</button>
      </nav>

      <div class="mt-auto pt-6 border-t border-white/5">
        <button onclick="logout()" class="menuBtn text-rose-400 hover:bg-rose-500/10"><i class="fas fa-sign-out-alt w-5"></i> Sair</button>
      </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
      
      <section id="secHome" class="secao ativa">
        <div id="alertaSaude" class="hidden p-4 rounded-2xl bg-rose-500/20 border border-rose-500 text-rose-200 animate-pulse">
            <i class="fas fa-exclamation-triangle mr-2"></i> <strong>Aviso:</strong> Suas dívidas superam sua receita mensal!
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
          <div class="cardResumo border-emerald-500/50 bg-emerald-500/5">
            <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-1">Ganhos Mensais</p>
            <h3 id="resumoReceita" class="text-2xl font-black">R$ 0,00</h3>
          </div>
          <div class="cardResumo border-rose-500/50 bg-rose-500/5">
            <p class="text-xs font-bold text-rose-400 uppercase tracking-widest mb-1">Dívidas Totais</p>
            <h3 id="resumoDividas" class="text-2xl font-black">R$ 0,00</h3>
          </div>
          <div class="cardResumo border-indigo-500/50 bg-indigo-500/5">
            <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Saldo Previsto</p>
            <h3 id="resumoSaldo" class="text-2xl font-black">R$ 0,00</h3>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="glass p-8 rounded-3xl border-t-4 border-emerald-500">
            <h3 class="text-lg font-bold mb-6"><i class="fas fa-plus-circle text-emerald-400"></i> Cadastrar Salário/Ganhos</h3>
            <div class="space-y-4">
              <input id="rec_desc" placeholder="Ex: Salário Mensal, Freelance" class="inputPadrao">
              <input id="rec_valor" type="number" step="0.01" placeholder="Valor R$ (Ex: 2221.88)" class="inputPadrao">
              <input id="rec_dia" type="number" placeholder="Dia do Recebimento (Ex: 8)" class="inputPadrao">
              <button onclick="addRecorrencia()" class="btnAcao bg-emerald-600">Salvar Ganhos</button>
            </div>
          </div>
          <div class="glass p-8 rounded-3xl">
            <h3 class="font-bold text-slate-300 uppercase tracking-widest text-sm mb-6">Detalhamento de Entradas</h3>
            <ul id="listaGanhos" class="space-y-4"></ul>
          </div>
        </div>
      </section>

      <section id="secDividas" class="secao">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-1/3 glass p-8 rounded-3xl border-t-4 border-rose-500 h-fit">
                <h3 class="text-lg font-bold mb-6">Nova Dívida</h3>
                <div class="space-y-4">
                    <input id="div_nome" placeholder="Nome da Dívida (Ex: Cartão)" class="inputPadrao">
                    <input id="div_valor" type="number" step="0.01" placeholder="Valor Total" class="inputPadrao">
                    <button onclick="addDivida()" class="btnAcao bg-rose-600">Registrar Dívida</button>
                </div>
            </div>
            <div class="lg:w-2/3 grid grid-cols-1 sm:grid-cols-2 gap-4" id="listaDividasGrid"></div>
        </div>
      </section>

      <section id="secMetas" class="secao">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-1/3 glass p-8 rounded-3xl border-t-4 border-purple-500 h-fit">
                <h3 class="text-lg font-bold mb-6">Nova Meta</h3>
                <div class="space-y-4">
                    <input id="meta_nome" placeholder="Nome da Meta" class="inputPadrao">
                    <input id="meta_alvo" type="number" placeholder="Valor do Objetivo" class="inputPadrao">
                    <input id="meta_atual" type="number" placeholder="Quanto já tem?" class="inputPadrao">
                    <button onclick="addMeta()" class="btnAcao bg-purple-600">Criar Objetivo</button>
                </div>
            </div>
            <div class="lg:w-2/3 space-y-6" id="listaMetasGrid"></div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
