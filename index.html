<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MetasBoard | OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #a855f7; --bg: #050505; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    
    #loginTela { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .glass { background: rgba(20, 20, 25, 0.7); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; backdrop-filter: blur(20px); }
    
    /* HUD Estilo Game */
    .hp-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; position: relative; overflow: hidden; }
    .hp-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ef4444, #a855f7, #22c55e); transition: all 1s ease-in-out; }
    
    .nav-active { color: var(--p); text-shadow: 0 0 15px var(--p); border-top: 2px solid var(--p); }
    .blur-mode .money { filter: blur(10px); }
    
    /* Input Futurista */
    input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 16px !important; }
    input:focus { border-color: var(--p) !important; outline: none; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

    .btn-main { background: linear-gradient(135deg, #a855f7, #7c3aed); transition: transform 0.2s; }
    .btn-main:active { transform: scale(0.96); }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loginTela">
    <h1 class="font-orbitron text-4xl mb-8 tracking-widest">METAS<span class="text-purple-500">BOARD</span></h1>
    <div class="glass p-8 w-full max-w-sm space-y-4">
        <input id="email" type="email" placeholder="Acesso ID" class="w-full p-4">
        <input id="senha" type="password" placeholder="Passcode" class="w-full p-4">
        <button onclick="executarAuth()" id="btnAuth" class="btn-main w-full p-4 rounded-2xl font-bold uppercase tracking-widest text-sm">Inicializar</button>
        <p onclick="alternarAuth()" id="txtAuth" class="text-center text-[10px] opacity-40 uppercase cursor-pointer">Novo por aqui? Criar ID</p>
    </div>
</div>

<div id="app" class="hidden min-h-screen pb-32">
    <header class="p-6 flex justify-between items-center">
        <div>
            <h2 class="font-orbitron text-lg uppercase tracking-tighter">Status: <span id="statusUser" class="text-green-500">Online</span></h2>
            <p id="dataRef" class="text-[10px] opacity-40 font-bold uppercase"></p>
        </div>
        <div class="flex gap-3">
            <button onclick="document.body.classList.toggle('blur-mode')" class="glass p-3">👁️</button>
            <button onclick="sair()" class="text-rose-500 font-bold text-[10px] glass px-4 py-2">LOGOUT</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 space-y-6">
        <div class="glass p-6 relative overflow-hidden">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[9px] opacity-40 uppercase font-black">HP Financeiro</p>
                    <h3 id="hpTexto" class="text-xl font-orbitron">EXECUTANDO...</h3>
                </div>
                <h4 id="saldoReal" class="money font-orbitron text-2xl text-purple-500">R$ 0</h4>
            </div>
            <div class="hp-bar-bg"><div id="hpFill" class="hp-bar-fill"></div></div>
            <div class="grid grid-cols-2 gap-4 mt-6 border-t border-white/5 pt-4">
                <div><p class="text-[8px] opacity-30 uppercase">Receitas</p><p id="txtReceita" class="money text-emerald-400 font-bold text-sm">R$ 0</p></div>
                <div class="text-right"><p class="text-[8px] opacity-30 uppercase">Contas</p><p id="txtDespesa" class="money text-rose-500 font-bold text-sm">R$ 0</p></div>
            </div>
        </div>

        <section id="secHome" class="space-y-4">
            <div class="glass p-5 space-y-4 border-l-4 border-purple-600">
                <div class="flex justify-between">
                    <span class="text-[10px] font-bold text-purple-400 uppercase">Input Central</span>
                    <div class="flex bg-black/40 p-1 rounded-lg gap-2">
                        <button onclick="mudarTipo('divida')" id="t-div" class="text-[9px] px-3 py-1 rounded-md bg-purple-600 font-black">SAÍDA</button>
                        <button onclick="mudarTipo('ganho')" id="t-gan" class="text-[9px] px-3 py-1 rounded-md opacity-40 font-black">RENDA</button>
                    </div>
                </div>
                
                <input id="masterInput" type="text" oninput="ajudaInteligente(this.value)" placeholder="O que aconteceu? (ex: Mercado 200)" class="w-full p-4 text-sm font-bold">
                
                <div class="flex gap-2">
                   <input id="valManual" type="number" placeholder="Valor" class="w-1/2 p-4 text-sm">
                   <input id="dateManual" type="date" class="w-1/2 p-4 text-[10px]">
                </div>

                <div class="flex items-center gap-2 p-1">
                    <input type="checkbox" id="checkSal" class="accent-purple-500">
                    <label for="checkSal" class="text-[9px] font-bold opacity-50 uppercase">Agendar p/ 5º dia útil</label>
                </div>

                <div id="cats" class="flex justify-between p-1">
                    <button onclick="setCat('🛒')" class="text-xl p-2 grayscale hover:grayscale-0">🛒</button>
                    <button onclick="setCat('🍔')" class="text-xl p-2 grayscale hover:grayscale-0">🍔</button>
                    <button onclick="setCat('🏠')" class="text-xl p-2 grayscale hover:grayscale-0">🏠</button>
                    <button onclick="setCat('🚀')" class="text-xl p-2 grayscale hover:grayscale-0">🚀</button>
                    <button onclick="setCat('💳')" class="text-xl p-2 grayscale hover:grayscale-0">💳</button>
                </div>

                <button onclick="salvar()" class="btn-main w-full p-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg">Processar Registro</button>
            </div>

            <div id="feed" class="space-y-3"></div>
        </section>

        <section id="secMetas" class="hidden space-y-4">
             <div class="flex justify-between items-center">
                 <h2 class="font-orbitron text-sm">OBJETIVOS ATIVOS</h2>
                 <button onclick="novaMeta()" class="glass px-4 py-2 text-[9px] font-bold">+ META</button>
             </div>
             <div id="listaMetas" class="space-y-4"></div>
        </section>

        <section id="secStats" class="hidden glass p-6">
            <h2 class="font-orbitron text-center mb-6">ANÁLISE DE FLUXO</h2>
            <canvas id="meuGrafico"></canvas>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass rounded-none border-t border-white/10 p-4 flex justify-around items-center z-50">
        <button onclick="nav('secHome', this)" class="nav-active flex flex-col items-center gap-1"><span class="text-xl">⚡</span><p class="text-[8px] font-bold">TERMINAL</p></button>
        <button onclick="nav('secMetas', this)" class="flex flex-col items-center gap-1 opacity-40"><span class="text-xl">🎯</span><p class="text-[8px] font-bold">METAS</p></button>
        <button onclick="nav('secStats', this)" class="flex flex-col items-center gap-1 opacity-40"><span class="text-xl">📊</span><p class="text-[8px] font-bold">GESTÃO</p></button>
    </nav>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
