<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetasBoard | Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style type="text/tailwindcss">
    @layer components {
      .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
      .inputPadrao { @apply w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none transition-all text-white; }
      .btnAcao { @apply w-full font-bold p-4 rounded-xl transition-all text-white; }
    }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

  <div id="loginTela" class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
      <h2 class="text-3xl font-black text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">MetasBoard</h2>
      <div class="space-y-4">
        <input id="email" type="email" placeholder="Seu email" class="inputPadrao">
        <input id="senha" type="password" placeholder="Sua senha" class="inputPadrao">
        <button onclick="login()" class="btnAcao bg-purple-600 hover:bg-purple-500">Entrar</button>
        <button onclick="registrar()" class="w-full text-slate-400 text-sm hover:text-white">Criar nova conta</button>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-64 glass p-6 flex flex-col gap-8 border-r border-white/5">
      <h1 class="text-xl font-bold text-purple-500 italic">METASBOARD</h1>
      <nav class="flex-1 space-y-2">
        <button class="w-full flex items-center gap-3 p-4 rounded-2xl bg-white/5 text-white"><i class="fas fa-chart-line"></i> Resumo</button>
      </nav>
      <button onclick="logout()" class="p-4 text-rose-400 font-bold flex items-center gap-3"><i class="fas fa-power-off"></i> Sair</button>
    </aside>

    <main class="flex-1 p-6 md:p-10 space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass p-4 rounded-2xl border-l-4 border-emerald-500"><p class="text-xs font-bold text-slate-400 uppercase">Receitas</p><h3 id="receitaTotal" class="text-xl font-black">R$ 0,00</h3></div>
        <div class="glass p-4 rounded-2xl border-l-4 border-rose-500"><p class="text-xs font-bold text-slate-400 uppercase">Despesas</p><h3 id="despesaTotal" class="text-xl font-black">R$ 0,00</h3></div>
        <div class="glass p-4 rounded-2xl border-l-4 border-purple-500"><p class="text-xs font-bold text-slate-400 uppercase">Saldo</p><h3 id="saldoTotal" class="text-xl font-black">R$ 0,00</h3></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="glass p-6 rounded-3xl h-fit">
          <h3 class="text-lg font-bold mb-4 italic">Nova Transação</h3>
          <div class="space-y-4">
            <input id="valor" type="number" placeholder="Valor (R$)" class="inputPadrao">
            <input id="categoriaTransacao" type="text" placeholder="Descrição" class="inputPadrao">
            <div class="flex gap-2">
              <button onclick="adicionarReceita()" class="flex-1 p-3 bg-emerald-600 rounded-xl font-bold hover:bg-emerald-500">Receita</button>
              <button onclick="adicionarDespesa()" class="flex-1 p-3 bg-rose-600 rounded-xl font-bold hover:bg-rose-500">Despesa</button>
            </div>
          </div>
        </div>
        <div class="lg:col-span-2 glass rounded-3xl overflow-hidden">
          <div class="p-6 border-b border-white/5 font-bold italic">Fluxo de Caixa</div>
          <ul id="listaMovimentos" class="p-4 space-y-3"></ul>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
