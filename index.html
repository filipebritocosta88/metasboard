<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MetasBoard | OS v3.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #a855f7; --bg: #050505; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(15px); }
    
    /* Progress Bars */
    .progress-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #a855f7, #7c3aed); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); transition: width 1s ease; }
    
    .nav-active { color: var(--p); opacity: 1 !important; transform: translateY(-5px); }
    .nav-active::after { content: ''; position: absolute; bottom: -10px; width: 20px; height: 2px; background: var(--p); left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px var(--p); }
    
    .blur-mode .money { filter: blur(15px); opacity: 0.2; }
    
    input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 16px !important; outline: none !important; transition: 0.3s; }
    input:focus { border-color: var(--p) !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

    .btn-main { background: linear-gradient(135deg, #a855f7, #7c3aed); cursor: pointer; transition: 0.3s; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    .btn-main:active { transform: scale(0.96); }
    
    .mic-btn.recording { background: #ef4444 !important; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    
    .hidden { display: none !important; }
    .card-item { animation: slideUp 0.4s ease-out forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="loginTela" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center p-6">
    <h1 class="font-orbitron text-4xl mb-2 tracking-widest">METAS<span class="text-purple-500">BOARD</span></h1>
    <p class="text-[10px] opacity-30 uppercase tracking-[0.5em] mb-12">Security Access Required</p>
    <div class="glass p-8 w-full max-w-sm space-y-4">
        <input id="email" type="email" placeholder="E-mail" class="w-full p-4 text-sm">
        <input id="senha" type="password" placeholder="Senha" class="w-full p-4 text-sm">
        <button onclick="executarAuth()" id="btnAuth" class="btn-main w-full p-4 rounded-2xl text-[11px]">Entrar</button>
        <button onclick="alternarAuth()" id="txtAuth" class="w-full text-center text-[9px] opacity-30 uppercase font-black py-2">Criar Chave de Acesso</button>
    </div>
</div>

<div id="app" class="hidden min-h-screen pb-32">
    <header class="p-8 flex justify-between items-center max-w-2xl mx-auto">
        <div class="flex flex-col">
            <h2 class="font-orbitron text-xl tracking-tighter">METAS<span class="text-purple-500">BOARD</span></h2>
            <span id="dataRef" class="text-[9px] text-purple-400 font-black uppercase mt-1 tracking-widest"></span>
        </div>
        <div class="flex gap-3">
            <button onclick="document.body.classList.toggle('blur-mode')" class="glass w-12 h-12 flex items-center justify-center text-lg">👁️</button>
            <button onclick="sair()" class="glass px-5 py-2 text-[10px] font-black text-rose-500 border border-rose-500/30">SAIR</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 space-y-6">
        <section id="secHome" class="space-y-6">
            <div class="glass p-6 space-y-5 border-b-2 border-purple-500/20">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[8px] opacity-40 uppercase font-black tracking-widest">Saldo Disponível</p>
                        <h3 id="saldoReal" class="money font-orbitron text-3xl">R$ 0</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] opacity-40 uppercase font-black text-emerald-500">Próximo Salário (5º DU)</p>
                        <h4 id="txtProximoSalario" class="money font-orbitron text-lg text-emerald-400">R$ 0</h4>
                    </div>
                </div>
                <div class="progress-bg"><div id="hpFill" class="progress-fill" style="width: 0%"></div></div>
            </div>

            <div class="glass p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <div class="flex bg-black/50 p-1 rounded-xl gap-1">
                        <button onclick="mudarTipo('divida')" id="t-div" class="text-[9px] px-6 py-2 rounded-lg bg-purple-600 font-black transition-all">GASTO</button>
                        <button onclick="mudarTipo('ganho')" id="t-gan" class="text-[9px] px-6 py-2 rounded-lg opacity-20 font-black transition-all">RENDA</button>
                    </div>
                    <button id="audioBtn" onclick="toggleAudio()" class="mic-btn glass w-12 h-12 flex items-center justify-center text-xl">🎤</button>
                </div>
                
                <div class="space-y-3">
                    <input id="masterInput" type="text" placeholder="O que aconteceu? (ex: Mercado 200)" class="w-full p-4 text-sm font-medium">
                    <div class="flex gap-3">
                        <input id="valManual" type="number" placeholder="Valor R$" class="w-1/2 p-4 text-sm">
                        <input id="dateManual" type="date" class="w-1/2 p-4 text-[10px]">
                    </div>
                    <div id="opcoesAvancadas" class="flex gap-2 items-center px-1">
                        <input type="checkbox" id="checkFixo" class="w-4 h-4 rounded-md border-purple-500/30">
                        <label for="checkFixo" class="text-[10px] opacity-50 uppercase font-black">Gasto Fixo / Parcelado</label>
                        <input id="qtdParcelas" type="number" placeholder="Meses" class="hidden w-16 p-2 text-center text-[10px]">
                    </div>
                </div>

                <button onclick="salvar()" class="btn-main w-full p-5 rounded-2xl text-[11px]">Confirmar Lançamento</button>
            </div>

            <div id="feed" class="space-y-3"></div>
        </section>

        <section id="secMetas" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-orbitron text-sm tracking-widest uppercase">Estratégias de Futuro</h3>
                <button onclick="abrirModalMeta()" class="btn-main px-4 py-2 rounded-xl text-[9px]">+ Nova Meta</button>
            </div>
            <div id="listaMetas" class="space-y-4 pb-10"></div>
        </section>

        <section id="secGestao" class="hidden space-y-6">
            <div class="glass p-6">
                <h4 class="text-[10px] font-black uppercase opacity-30 mb-4 tracking-widest text-center">Saúde Financeira Mensal</h4>
                <div class="h-64"><canvas id="meuGrafico"></canvas></div>
            </div>

            <div class="glass p-6 space-y-4 border-t border-emerald-500/20">
                <div class="flex justify-between items-center">
                    <h4 class="text-[10px] font-black uppercase text-emerald-400">Configuração de Salário</h4>
                    <span class="text-[8px] opacity-30 uppercase">Entrada Automática</span>
                </div>
                <div class="flex gap-3">
                    <input id="inputSalarioBase" type="number" placeholder="Valor do Salário R$" class="w-full p-4 text-sm">
                    <button onclick="configurarSalario()" class="btn-main px-6 rounded-2xl text-[10px]">Salvar</button>
                </div>
            </div>

            <div id="mentorDicas" class="glass p-6 border-l-4 border-purple-500 bg-purple-500/5">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-xl">🦾</span>
                    <h4 class="text-[10px] font-black uppercase tracking-tighter">Mentor MetasBoard</h4>
                </div>
                <p id="textoMentor" class="text-xs opacity-70 leading-relaxed italic">Iniciando protocolos de análise...</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass rounded-none border-t border-white/10 p-6 flex justify-around items-center z-50">
        <button onclick="nav('secHome', this)" class="nav-active flex flex-col items-center gap-2 opacity-30 transition-all"><span class="text-xl">🏠</span><p class="text-[8px] font-black uppercase tracking-widest">Home</p></button>
        <button onclick="nav('secMetas', this)" class="flex flex-col items-center gap-2 opacity-30 transition-all"><span class="text-xl">🎯</span><p class="text-[8px] font-black uppercase tracking-widest">Metas</p></button>
        <button onclick="nav('secGestao', this)" class="flex flex-col items-center gap-2 opacity-30 transition-all"><span class="text-xl">📊</span><p class="text-[8px] font-black uppercase tracking-widest">Gestão</p></button>
    </nav>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
