<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetasBoard Ultra Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #a855f7; --bg: #0b0e14; --card: #161b30; }
    body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
    .nav-btn-m.active { color: var(--primary); font-weight: 900; border-top: 2px solid var(--primary); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; color: white !important; background: rgba(0,0,0,0.4) !important; }
    .meta-bar-fill { transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
  </style>
</head>
<body class="overflow-x-hidden no-scrollbar">

<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0d111a]/95 backdrop-blur-lg border-t border-slate-800 flex justify-around p-3 z-[1000]">
    <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn-m active text-[10px] flex flex-col items-center gap-1"><span>📊</span>Início</button>
    <button onclick="mostrarSecao('secMetas', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>🏆</span>Metas</button>
    <button onclick="mostrarSecao('secDividas', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>💳</span>Gestão</button>
    <button onclick="mostrarSecao('secInvest', this)" class="nav-btn-m text-[10px] flex flex-col items-center gap-1"><span>🚀</span>Investir</button>
</nav>

<div id="loginTela" class="flex items-center justify-center min-h-screen p-6">
  <div class="glass-card p-8 w-full max-w-md text-center">
    <h1 class="text-3xl font-black mb-8 italic">METAS<span class="text-purple-500">BOARD</span></h1>
    <div class="space-y-4">
      <input id="email" type="email" placeholder="E-mail" class="w-full p-4 rounded-xl border border-slate-700 outline-none">
      <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-xl border border-slate-700 outline-none">
      <button onclick="login()" class="w-full bg-purple-600 p-4 rounded-xl font-black uppercase">Acessar</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen pb-20 md:flex">
  <aside class="hidden md:flex w-64 border-r border-slate-800 p-6 flex-col bg-[#0d111a]">
    <h2 class="text-xl font-black mb-10 italic">METAS<span class="text-purple-500">BOARD</span></h2>
    <nav class="space-y-2">
      <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn active w-full p-3 rounded-lg text-left font-bold transition">📊 Visão Geral</button>
      <button onclick="mostrarSecao('secMetas', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400 transition">🏆 Ranking & Metas</button>
      <button onclick="mostrarSecao('secDividas', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400 transition">💳 Gestão de Dívidas</button>
      <button onclick="mostrarSecao('secInvest', this)" class="nav-btn w-full p-3 rounded-lg text-left text-slate-400 transition">🚀 Onde Investir</button>
    </nav>
    <button onclick="logout()" class="mt-auto p-3 text-red-500 font-bold">Sair</button>
  </aside>

  <main class="flex-1 p-4 md:p-8 overflow-y-auto no-scrollbar">
    <section id="secDashboard" class="max-w-6xl mx-auto space-y-6">
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <div class="glass-card p-4 border-l-4 border-emerald-500"><p class="text-[10px] font-black opacity-50">GANHOS</p><h3 id="receitaTotal" class="text-lg md:text-2xl font-black">R$ 0,00</h3></div>
        <div class="glass-card p-4 border-l-4 border-rose-500"><p class="text-[10px] font-black opacity-50">DÍVIDAS</p><h3 id="despesaTotal" class="text-lg md:text-2xl font-black">R$ 0,00</h3></div>
        <div class="glass-card p-4 border-l-4 border-purple-500 col-span-2 md:col-span-1"><p class="text-[10px] font-black opacity-50">SALDO LIVRE</p><h3 id="saldoTotal" class="text-xl md:text-2xl font-black">R$ 0,00</h3></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="glass-card p-6 border-l-8 border-purple-500 bg-gradient-to-br from-purple-900/20 to-transparent">
                <h4 class="text-xs font-black uppercase mb-2 flex items-center gap-2">🔮 Mentor IA</h4>
                <p id="iaTexto" class="text-xs md:text-sm italic opacity-80 leading-relaxed"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass-card p-4 border border-yellow-500/20"><p class="text-[9px] font-black text-yellow-500 uppercase mb-1">🔥 Desafio</p><p id="txtDesafio" class="text-xs font-bold italic"></p></div>
                <div class="glass-card p-4 border border-blue-500/20"><p class="text-[9px] font-black text-blue-500 uppercase mb-1">📅 Vencimento</p><p id="txtVencimento" class="text-xs font-bold"></p></div>
            </div>
            <div class="glass-card p-5">
                <h4 class="text-[10px] font-black text-slate-500 uppercase mb-3">Histórico Mensal</h4>
                <div id="gridHistorico" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
            </div>
        </div>

        <div class="glass-card p-6 relative">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black italic uppercase">Registrar Fluxo</h3>
                <button onclick="verHistoricoFluxo()" class="w-10 h-10 rounded-full bg-purple-600 text-white font-black text-xl shadow-lg flex items-center justify-center">!</button>
            </div>
            <div class="space-y-3">
                <input id="fluxoNome" type="text" placeholder="Nome" class="w-full p-3 rounded-xl border border-white/10 outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input id="fluxoValor" type="number" placeholder="Valor R$" class="p-3 rounded-xl border border-white/10 outline-none">
                    <input id="fluxoDia" type="number" placeholder="Dia" class="p-3 rounded-xl border border-white/10 outline-none">
                </div>
                <select id="fluxoTipo" class="w-full p-3 rounded-xl border border-white/10 outline-none">
                    <option value="ganho">Ganho (+)</option>
                    <option value="divida">Dívida (-)</option>
                </select>
                <button onclick="adicionarFluxo()" class="w-full bg-purple-600 p-4 rounded-xl font-black uppercase text-sm">Salvar no Banco</button>
            </div>
        </div>
      </div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase">Copa das Metas 🏆</h2>
            <button onclick="abrirModalMeta()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-black text-xs uppercase">+ Nova Meta</button>
        </div>
        <div id="rankingGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <section id="secDividas" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-6 flex flex-col items-center justify-center">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-6">Mapa de Dívidas</h3>
                <div class="relative w-56 h-56 md:w-64 md:h-64">
                    <canvas id="chartDividas"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-[10px] font-bold text-slate-400">TOTAL</span>
                        <span id="chartTotalLabel" class="text-xl font-black text-rose-500">R$ 0</span>
                    </div>
                </div>
            </div>
            <div id="listaDividasDetalhada" class="space-y-3"></div>
        </div>
    </section>

    <section id="secInvest" class="hidden max-w-2xl mx-auto space-y-6">
        <div class="glass-card p-8 border-l-8 border-emerald-500">
            <h2 class="text-2xl font-black mb-2 uppercase italic">Acelerador de Capital</h2>
            <p class="text-xs text-slate-400 mb-6">Saldo disponível para análise: <b id="saldoInvestLabel" class="text-white">R$ 0,00</b></p>
            <button onclick="analisarInvestimentoIA()" class="w-full bg-emerald-600 p-4 rounded-xl font-black uppercase">Gerar Estratégia</button>
        </div>
        <div id="boxResultadoInvest" class="hidden glass-card p-6 space-y-4"></div>
    </section>
  </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
