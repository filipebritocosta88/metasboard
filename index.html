<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MetasBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="flex">

  <aside class="w-64 bg-slate-800 min-h-screen p-6">
    <h1 class="text-2xl font-bold mb-8 text-purple-400">MetasBoard</h1>
    
    <nav class="space-y-4">
      <button class="block w-full text-left hover:text-purple-400">📊 Dashboard</button>
      <button class="block w-full text-left hover:text-purple-400">🎯 Metas</button>
      <button class="block w-full text-left hover:text-purple-400">💰 Receitas</button>
      <button class="block w-full text-left hover:text-purple-400">💸 Despesas</button>
    </nav>
  </aside>

  <main class="flex-1 p-10">

    <h2 class="text-3xl font-bold mb-8">Dashboard</h2>

    <div class="grid grid-cols-3 gap-6 mb-10">

      <div class="bg-gradient-to-r from-green-500 to-emerald-700 p-6 rounded-2xl shadow-xl">
        <h3 class="text-lg">Receita</h3>
        <p id="receitaTotal" class="text-3xl font-bold mt-2">R$ 0</p>
      </div>

      <div class="bg-gradient-to-r from-red-500 to-rose-700 p-6 rounded-2xl shadow-xl">
        <h3 class="text-lg">Despesa</h3>
        <p id="despesaTotal" class="text-3xl font-bold mt-2">R$ 0</p>
      </div>

      <div class="bg-gradient-to-r from-purple-500 to-indigo-700 p-6 rounded-2xl shadow-xl">
        <h3 class="text-lg">Saldo</h3>
        <p id="saldoTotal" class="text-3xl font-bold mt-2">R$ 0</p>
      </div>

    </div>

    <div class="bg-slate-800 p-6 rounded-2xl shadow-lg">

      <h3 class="text-xl mb-4">Adicionar Valor</h3>

      <input id="valor" type="number" placeholder="Digite o valor"
        class="w-full p-3 rounded bg-slate-700 mb-4">

      <div class="flex gap-4">
        <button onclick="adicionarReceita()"
          class="bg-green-600 px-4 py-2 rounded hover:bg-green-700">
          + Receita
        </button>

        <button onclick="adicionarDespesa()"
          class="bg-red-600 px-4 py-2 rounded hover:bg-red-700">
          - Despesa
        </button>
      </div>

    </div>

  </main>
</div>

<script src="app.js"></script>

</body>
</html>
