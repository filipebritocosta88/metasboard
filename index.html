<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetasBoard | Premium Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    .progress-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

<div id="loginTela" class="flex items-center justify-center min-h-screen p-4">
  <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
    <div class="text-center mb-8">
        <h2 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">MetasBoard</h2>
        <p class="text-slate-400 mt-2 italic">Sua jornada financeira começa aqui.</p>
    </div>
    <div class="space-y-4">
        <input id="email" type="email" placeholder="Email" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none transition-all">
        <input id="senha" type="password" placeholder="Senha" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none transition-all">
        <button onclick="login()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold p-4 rounded-xl transition-all">Entrar</button>
        <button onclick="registrar()" class="w-full text-slate-400 hover:text-white text-sm transition-all text-center block w-full">Criar conta nova</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
  <aside class="w-full md:w-64 glass p-6 flex flex-col gap-8 border-r border-white/5">
    <h1 class="text-2xl font-black text-purple-500 flex items-center gap-2 italic">
        <i class="fas fa-rocket"></i> METASBOARD
    </h1>
    <nav class="space-y-2 flex-1">
      <button onclick="mostrarSecao('secDashboard')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 flex items-center gap-3 transition-all font-semibold"><i class="fas fa-chart-line text-purple-400"></i> Resumo</button>
      <button onclick="mostrarSecao('secContas')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 flex items-center gap-3 transition-all font-semibold"><i class="fas fa-university text-blue-400"></i> Bancos</button>
      <button onclick="mostrarSecao('secDividas')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 flex items-center gap-3 transition-all font-semibold"><i class="fas fa-credit-card text-rose-400"></i> Dívidas</button>
      <button onclick="mostrarSecao('secMetas')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 flex items-center gap-3 transition-all font-semibold"><i class="fas fa-bullseye text-emerald-400"></i> Metas</button>
    </nav>
    <button onclick="logout()" class="p-4 text-rose-400 hover:bg-rose-500/10 rounded-xl flex items-center gap-3 transition-all font-bold"><i class="fas fa-power-off"></i> Sair</button>
  </aside>

  <main class="flex-1 p-6 md:p-10 overflow-y-auto">
    <section id="secDashboard" class="space-y-8 animate-in fade-in duration-700">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
        <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Receitas</p>
          <p id="receitaTotal" class="text-xl font-black mt-1">R$ 0,00</p>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-rose-500">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Despesas</p>
          <p id="despesaTotal" class="text-xl font-black mt-1">R$ 0,00</p>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Saldo Livre</p>
          <p id="saldoTotal" class="text-xl font-black mt-1">R$ 0,00</p>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Bancos</p>
          <p id="totalContas" class="text-xl font-black mt-1">R$ 0,00</p>
        </div>
        <div class="glass p-6 rounded-2xl border-l-4 border-orange-500">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Dívidas</p>
          <p id="totalDividas" class="text-xl font-black mt-1">R$ 0,00</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="glass p-6 rounded-3xl h-fit">
          <h3 class="text-xl font-bold mb-6 italic"><i class="fas fa-plus-circle text-purple-400 mr-2"></i>Nova Entrada</h3>
          <div class="space-y-4">
            <input id="valor" type="number" step="0.01" placeholder="R$ 0,00" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-xl font-black outline-none focus:border-purple-500">
            <input id="categoriaTransacao" type="text" placeholder="Categoria" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
            <div class="grid grid-cols-2 gap-3">
              <button onclick="adicionarReceita()" class="bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold transition-all shadow-lg shadow-emerald-900/20">Receita</button>
              <button onclick="adicionarDespesa()" class="bg-rose-600 hover:bg-rose-500 p-4 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20">Despesa</button>
            </div>
          </div>
        </div>
        <div class="lg:col-span-2 glass rounded-3xl flex flex-col min-h-[400px]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-bold italic">Fluxo de Caixa</h3>
                <i class="fas fa-history text-slate-500"></i>
            </div>
            <ul id="listaMovimentos" class="p-4 space-y-3"></ul>
        </div>
      </div>
    </section>

    <section id="secContas" class="hidden space-y-6">
      <div class="flex justify-between items-center">
          <h2 class="text-3xl font-black italic">BANCOS 🏦</h2>
          <button onclick="adicionarConta()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all">+ Novo Banco</button>
      </div>
      <div id="listaContas" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </section>

    <section id="secDividas" class="hidden space-y-6">
      <div class="flex justify-between items-center">
          <h2 class="text-3xl font-black italic text-rose-500">DÍVIDAS 💳</h2>
          <button onclick="adicionarDivida()" class="bg-rose-600 hover:bg-rose-500 px-6 py-3 rounded-xl font-bold transition-all">+ Nova Dívida</button>
      </div>
      <div id="listaDividas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

    <section id="secMetas" class="hidden space-y-6">
      <div class="flex justify-between items-center">
          <h2 class="text-3xl font-black italic text-emerald-400">METAS 🎯</h2>
          <button onclick="adicionarMeta()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-bold transition-all">+ Nova Meta</button>
      </div>
      <div id="listaMetas" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </section>
  </main>
</div>

<script type="module" src="app.js"></script>

<script>
  function mostrarSecao(id) {
    ['secDashboard', 'secContas', 'secDividas', 'secMetas'].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
</script>
</body>
</html>
