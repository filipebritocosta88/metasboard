<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetasBoard Pro - Sistema Integrado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .glass-card { background: #161b30; border: 1px solid rgba(255,255,255,0.05); }
    .nav-btn.active { background: rgba(168, 85, 247, 0.2); color: #a855f7; border-left: 4px solid #a855f7; }
    .meta-progress { height: 10px; background: #1e2540; border-radius: 5px; overflow: hidden; }
    .meta-bar { height: 100%; background: #eab308; transition: width 0.8s ease; }
    /* Modo Privacidade */
    body.privacy-mode .money-val { filter: blur(10px); pointer-events: none; }
    input::placeholder { color: #475569; }
  </style>
</head>
<body>

<div id="loginTela" class="flex items-center justify-center min-h-screen">
  <div class="glass-card p-10 rounded-[32px] shadow-2xl w-full max-w-md mx-4 text-center">
    <h1 class="text-3xl font-black mb-8 italic">🚀 METASBOARD</h1>
    <div class="space-y-4">
      <input id="email" type="email" placeholder="Seu e-mail" class="w-full p-4 rounded-2xl bg-[#0b0e14] border border-slate-700 outline-none focus:border-purple-500">
      <input id="senha" type="password" placeholder="Sua senha" class="w-full p-4 rounded-2xl bg-[#0b0e14] border border-slate-700 outline-none focus:border-purple-500">
      <button onclick="login()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black hover:bg-emerald-500 transition">ENTRAR</button>
      <button onclick="registrar()" class="w-full border border-slate-700 p-4 rounded-2xl text-slate-400">CRIAR CONTA</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
  <aside class="w-full md:w-72 border-r border-slate-800 p-8 flex flex-col">
    <h1 class="text-2xl font-black mb-12 text-purple-500">METASBOARD</h1>
    <nav class="space-y-2 flex-1">
      <button onclick="mostrarSecao('secDashboard', this)" class="nav-btn active flex items-center gap-4 w-full p-4 rounded-xl font-bold transition">📊 Dashboard</button>
      <button onclick="mostrarSecao('secMetas', this)" class="nav-btn flex items-center gap-4 w-full p-4 rounded-xl text-slate-400 font-bold transition">🎯 Metas</button>
      <button onclick="mostrarSecao('secDividas', this)" class="nav-btn flex items-center gap-4 w-full p-4 rounded-xl text-slate-400 font-bold transition">💳 Dívidas</button>
    </nav>
    <div class="mt-auto space-y-3">
        <button onclick="togglePrivacidade()" class="w-full p-3 rounded-xl border border-slate-700 text-xs font-bold">👁️ Privacidade</button>
        <button onclick="gerarPDF()" class="w-full bg-slate-800 p-3 rounded-xl text-[10px] font-black">📄 RELATÓRIO PDF</button>
        <button onclick="logout()" class="text-red-500 font-black p-4 text-left">🚪 Sair</button>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <section id="secDashboard" class="max-w-6xl mx-auto space-y-8">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <div class="glass-card p-6 rounded-3xl border-l-4 border-emerald-500">
          <p class="text-[10px] font-black text-emerald-400 uppercase">Ganhos Mensais</p>
          <h3 class="money-val text-2xl font-black italic" id="receitaTotal">R$ 0,00</h3>
        </div>
        <div class="glass-card p-6 rounded-3xl border-l-4 border-rose-500">
          <p class="text-[10px] font-black text-rose-500 uppercase">Dívidas Totais</p>
          <h3 class="money-val text-2xl font-black italic" id="despesaTotal">R$ 0,00</h3>
        </div>
        <div class="glass-card p-6 rounded-3xl border-l-4 border-purple-500">
          <p class="text-[10px] font-black text-purple-400 uppercase">Saldo Disponível</p>
          <h3 class="money-val text-2xl font-black italic" id="saldoTotal">R$ 0,00</h3>
        </div>
      </div>

      <div id="iaAlerta" class="hidden bg-purple-900/20 border border-purple-500/30 p-6 rounded-[2rem] flex items-center gap-4">
          <span class="text-3xl">🔮</span>
          <p id="iaPrevisaoTexto" class="text-sm text-slate-300 font-medium"></p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="glass-card p-8 rounded-[32px]">
          <h3 class="text-xl font-black mb-6 italic">📅 Agendamentos</h3>
          <div class="grid grid-cols-2 gap-2 mb-6">
            <input id="descFixo" type="text" placeholder="Ex: Salário" class="p-3 bg-black rounded-xl border border-slate-800 text-xs">
            <input id="valorFixo" type="number" placeholder="Valor" class="p-3 bg-black rounded-xl border border-slate-800 text-xs">
            <input id="diaFixo" type="number" placeholder="Dia (1-31)" class="p-3 bg-black rounded-xl border border-slate-800 text-xs">
            <select id="tipoFixo" class="p-3 bg-black rounded-xl border border-slate-800 text-xs">
                <option value="ganho">Ganho (+)</option>
                <option value="divida">Dívida (-)</option>
            </select>
            <button onclick="adicionarFixo()" class="col-span-2 bg-emerald-600 py-3 rounded-xl font-black">SALVAR AUTOMAÇÃO</button>
          </div>
          <ul id="listaGanhosFixos" class="space-y-2"></ul>
        </div>

        <div class="glass-card p-8 rounded-[32px] text-center border border-blue-500/10">
          <p class="text-xs font-black text-slate-500 uppercase mb-2">Reserva Acumulada</p>
          <h2 class="money-val text-5xl font-black mb-10 tracking-tighter" id="accumuladoReserva">R$ 0,00</h2>
          <div class="flex gap-4">
            <button onclick="alterarReserva('adicionar')" class="flex-1 bg-blue-600 py-4 rounded-xl font-black hover:bg-blue-500 transition">+ Guardar</button>
            <button onclick="alterarReserva('retirar')" class="flex-1 border border-slate-700 py-4 rounded-xl font-black hover:bg-slate-800 transition">- Retirar</button>
          </div>
        </div>
      </div>
    </section>

    <section id="secMetas" class="hidden max-w-5xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-3xl font-black italic">🎯 Metas & Sonhos</h2>
            <button onclick="adicionarMetaPro()" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-black">NOVA META</button>
        </div>
        <div id="gridMetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>

    <section id="secDividas" class="hidden max-w-4xl mx-auto glass-card p-8 rounded-3xl">
        <h2 class="text-2xl font-black mb-6 italic">💳 Dívidas Registradas</h2>
        <ul id="listaDividas" class="space-y-4"></ul>
    </section>
  </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
