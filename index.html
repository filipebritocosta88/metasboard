<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MetasBoard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- MENU LATERAL -->

<aside class="sidebar">

<h1 class="logo">METAS<span>BOARD</span></h1>

<nav>

<button onclick="mostrarSecao('dashboard')" class="active">
📊 Visão Geral
</button>

<button onclick="mostrarSecao('metas')">
🏆 Ranking & Metas
</button>

<button onclick="mostrarSecao('dividas')">
💳 Gestão de Dívidas
</button>

<button onclick="mostrarSecao('investir')">
🚀 Onde Investir
</button>

</nav>

</aside>


<!-- CONTEÚDO -->

<main>

<section id="dashboard">

<!-- CARDS -->

<div class="cards">

<div class="card ganhos">
<h3>GANHOS</h3>
<p id="ganhosTotal">R$ 0</p>
</div>

<div class="card dividas">
<h3>DÍVIDAS</h3>
<p id="dividasTotal">R$ 0</p>
</div>

<div class="card saldo">
<h3>SALDO LIVRE</h3>
<p id="saldoLivre">R$ 0</p>
</div>

</div>


<!-- GRID PRINCIPAL -->

<div class="dashboard-grid">

<div class="col-esquerda">

<div class="mentor">

<h3>🔮 MENTOR IA</h3>

<p id="mentorTexto">
Seu mentor financeiro aparecerá aqui.
</p>

</div>


<div class="mini-cards">

<div class="desafio">

<h4>🔥 DESAFIO DA SEMANA</h4>

<p id="desafioTexto">
Carregando desafio...
</p>

</div>


<div class="vencimento">

<h4>📅 PRÓXIMO VENCIMENTO</h4>

<p id="vencimentoTexto">
Nenhum
</p>

</div>

</div>

</div>


<!-- REGISTRAR FLUXO -->

<div class="registrar">

<h3>📥 Registrar Fluxo</h3>

<input id="nomeFluxo" placeholder="Nome (Ex: Aluguel)">

<div class="linha">

<input id="valorFluxo" type="number" placeholder="Valor">

<input id="diaFluxo" type="number" placeholder="Dia Venc.">

</div>

<select id="tipoFluxo">

<option value="ganho">É um Ganho (+)</option>
<option value="divida">É uma Dívida (-)</option>

</select>

<button onclick="adicionarFluxo()">
SALVAR
</button>

</div>

</div>

</section>


<section id="metas" style="display:none">

<h2>🏆 Ranking & Metas</h2>

<div id="listaMetas"></div>

</section>


<section id="dividas" style="display:none">

<h2>💳 Gestão de Dívidas</h2>

<canvas id="graficoDividas"></canvas>

</section>


<section id="investir" style="display:none">

<h2>🚀 Onde Investir</h2>

<button onclick="analisarInvestimentoIA()">
Analisar com IA
</button>

<p id="resultadoInvestimento"></p>

</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
