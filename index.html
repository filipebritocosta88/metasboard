<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>MetasBoard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="login">

<h1>MetasBoard</h1>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>


<div id="app" style="display:none">

<aside>

<h2>METAS<span>BOARD</span></h2>

<button onclick="mostrarSecao('dashboard')">📊 Visão Geral</button>
<button onclick="mostrarSecao('metas')">🏆 Ranking & Metas</button>
<button onclick="mostrarSecao('dividas')">💳 Gestão de Dívidas</button>
<button onclick="mostrarSecao('investir')">🚀 Onde Investir</button>

<button onclick="logout()">Sair</button>

</aside>


<main>

<section id="dashboard">

<div class="cards">

<div class="card ganho">
<h3>GANHOS</h3>
<p id="ganhosTotal">R$0</p>
</div>

<div class="card divida">
<h3>DÍVIDAS</h3>
<p id="dividasTotal">R$0</p>
</div>

<div class="card saldo">
<h3>SALDO LIVRE</h3>
<p id="saldoLivre">R$0</p>
</div>

</div>


<div class="mentor">
<h3>🔮 MENTOR IA</h3>
<p id="mentorTexto"></p>
</div>


<div class="extras">

<div class="desafio">
<h4>🔥 DESAFIO DA SEMANA</h4>
<p id="desafioTexto"></p>
</div>

<div class="vencimento">
<h4>📅 PRÓXIMO VENCIMENTO</h4>
<p id="vencimentoTexto"></p>
</div>

</div>


<div class="registrar">

<h3>📥 Registrar Fluxo</h3>

<input id="nomeFluxo" placeholder="Nome (Ex: Aluguel)">
<input id="valorFluxo" type="number" placeholder="Valor">
<input id="diaFluxo" type="number" placeholder="Dia Venc.">

<select id="tipoFluxo">
<option value="ganho">É um Ganho (+)</option>
<option value="divida">É uma Dívida (-)</option>
</select>

<button onclick="adicionarFluxo()">SALVAR</button>

</div>

</section>


<section id="metas" style="display:none">

<h2>🏆 Ranking de Metas</h2>

<div id="listaMetas"></div>

</section>


<section id="dividas" style="display:none">

<h2>💳 Gestão de Dívidas</h2>

<canvas id="graficoDividas"></canvas>

</section>


<section id="investir" style="display:none">

<h2>🚀 IA de Investimentos</h2>

<button onclick="analisarInvestimentoIA()">Analisar</button>

<p id="resultadoInvestimento"></p>

</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
